patients.insurance.eu: "Pacijenti iz EU mogu koristiti Evropsku karticu zdravstvenog osiguranja (EKZO)"
patients.insurance.foreign: "Za strane državljane — privatno zdravstveno osiguranje ili plaćanje usluga"
