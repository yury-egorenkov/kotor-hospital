dept.gynecology.hours: "Hitna: 0–24 / Ambulanta: pon–pet, 07–15h"

dept.internal.name: "Interna medicina"
dept.internal.desc: "Odjeljenje interne medicine bavi se dijagnostikom i liječenjem oboljenja unutrašnjih organa — kardiovaskularni sistem, pulmologija, gastroenterologija, endokrinologija."
dept.internal.service1: "Kardiologija i EKG dijagnostika"
