about.badge: "O nama"
about.title: "O bolnici"
about.p1: "Javna zdravstvena ustanova Opšta bolnica Kotor pruža zdravstvenu zaštitu stanovništvu opština Kotor, Tivat i Herceg Novi — ukupno preko 70.000 stanovnika Bokokotorskog zaliva."
about.p2: "Bolnica raspolaže sa pet stacionarnih odjeljenja i šest specijalističkih ambulanti. Osim glavnog objekta u Škaljarima, bolnica upravlja i filijalnim objektom u Meljinama koji pruža rehabilitacione usluge."
about.p3: "U toku je projekat proširenja bolnice vrijedan €9 miliona, koji će značajno unaprijediti kapacitete i kvalitet usluga. Bolnica je takođe partner u EU projektu TELE.DOC (€1,116M) za razvoj telemedicine u regionu."
about.stat.employees: "zaposlenih"
about.stat.doctors: "ljekara"
about.stat.municipalities: "opštine"
about.stat.expansion: "proširenje"
about.project.expansion.title: "Proširenje bolnice — €9M"
about.project.expansion.desc: "Novi kapaciteti, savremena oprema i renovirani prostori za kvalitetnije usluge."
about.project.teledoc.title: "TELE.DOC — EU projekat, €1,116M"
about.project.teledoc.desc: "Razvoj telemedicine i digitalne zdravstvene zaštite u prekograničnom regionu."

