patients.insurance.summary: "Bolnica prima pacijente sa obaveznim, evropskim i privatnim osiguranjem, kao i samoplatce."
patients.insurance.more: "Detaljnije o osiguranju"

insurance.page.description: "Zdravstveno osiguranje u Opštoj bolnici Kotor — Fond, EKZO, privatno osiguranje i samoplata."
insurance.badge: "Osiguranje"
insurance.title: "Zdravstveno osiguranje"
insurance.subtitle: "Koje vrste osiguranja prihvatamo i šta treba da znate prije dolaska."

insurance.fond.title: "Fond za zdravstveno osiguranje"
insurance.fond.p1: "Opšta bolnica Kotor ima ugovor sa Fondom za zdravstveno osiguranje Crne Gore. Pokriveni su: hitna pomoć, bolničko i ambulantno liječenje, dijagnostika i rehabilitacija."
insurance.fond.p2: "Potrebno je ponijeti zdravstvenu knjižicu i uput od izabranog ljekara. Za hitne slučajeve uput nije potreban."
insurance.fond.p3: "Za osiguranike Fonda nema dodatnih troškova — liječenje je besplatno u okviru ugovorenih usluga."

insurance.eu.title: "Evropska kartica — EKZO / EHIC"
insurance.eu.p1: "Građani EU/EEA mogu koristiti Evropsku karticu zdravstvenog osiguranja (EKZO/EHIC). Pokriveni su hitna medicinska pomoć i medicinski neophodno liječenje tokom boravka."
insurance.eu.p2: "EKZO ne pokriva: planirane zahvate, repatrijaciju, elektivnu stomatologiju. Karticu predajte na recepciji prije početka liječenja."
insurance.eu.p3: "Bez kartice — usluge se plaćaju u cjelosti, a refundacija se traži u matičnoj zemlji."

insurance.private.title: "Privatno osiguranje"
insurance.private.p1: "Bolnica prihvata privatno zdravstveno osiguranje. Sa pojedinim kompanijama moguć je direktan obračun, dok se kod ostalih plaća unaprijed i traži refundacija."
insurance.private.p2: "Ponesite polisu osiguranja i ličnu kartu ili pasoš. Za prethodno odobrenje kontaktirajte recepciju bolnice."

insurance.selfpay.title: "Bez osiguranja — samoplata"
insurance.selfpay.p1: "Pacijenti bez osiguranja mogu koristiti usluge bolnice uz plaćanje po cjenovniku. Cjenovnik je dostupan na recepciji."
insurance.selfpay.p2: "Plaćanje se vrši prije ili prilikom otpusta. Prihvatamo gotovinu i platne kartice."
insurance.selfpay.p3: "Hitna medicinska pomoć pruža se svim pacijentima bez obzira na status osiguranja."

laboratory.page.description: "Laboratorija Opšte bolnice Kotor — vrste analiza, priprema, radno vrijeme, rezultati i eZdravlje portal."
laboratory.badge: "Laboratorija"
laboratory.title: "Laboratorija"
laboratory.subtitle: "Vrste analiza, priprema za pregled, radno vrijeme i preuzimanje rezultata."

laboratory.tests.title: "Vrste analiza"
laboratory.tests.p1: "Hematologija (kompletna krvna slika, koagulacija, krvna grupa), biohemija (glukoza, lipidi, funkcija jetre i bubrega, elektroliti) i analiza urina."
laboratory.tests.p2: "Dodatne analize dostupne po upućivanju ljekara specijaliste."

laboratory.preparation.title: "Priprema za analizu"
laboratory.preparation.p1: "Krv se daje natašte (8–12 h bez hrane, voda dozvoljena). Preporučuje se jutarnje uzimanje uzoraka (07–09 h)."
laboratory.preparation.p2: "Ponesite uput i zdravstvenu knjižicu. Obavijestite osoblje o lijekovima koje koristite."

laboratory.hours.title: "Radno vrijeme"
laboratory.hours.p1: "Pon–pet 07:00–15:00. Uzimanje krvi: 07:00–09:00. Hitna laboratorija: 24/7 preko Odjeljenja hitne pomoći."
laboratory.hours.p2: "Za rutinske krvne analize nije potrebno zakazivanje."

laboratory.results.title: "Rezultati"
laboratory.results.p1: "Rutinski rezultati: isti dan ili sljedeći radni dan. Specijalizovane analize: 3–5 radnih dana."
laboratory.results.p2: "Rezultati dostupni putem portala eZdravlje ili na recepciji. Hitni rezultati se šalju direktno ljekaru koji je uputio pacijenta."

laboratory.ezdravlje.title: "Portal eZdravlje"
laboratory.ezdravlje.p1: "Nacionalni zdravstveni portal za pristup rezultatima analiza. Registracija putem JMBG i broja zdravstvene knjižice."
laboratory.ezdravlje.p2: "Pregledajte rezultate laboratorijskih analiza, upute i recepte na ezdravlje.me."

meljine.page.description: "Filijala Meljine — rehabilitacione usluge, fizikalna terapija, lokacija, radno vrijeme i kontakt."
meljine.badge: "Filijala Meljine"
meljine.title: "Filijala Meljine"
meljine.subtitle: "Rehabilitacioni centar Opšte bolnice Kotor u Herceg Novom."

meljine.rehabilitation.title: "Rehabilitacione usluge"
meljine.rehabilitation.p1: "Filijala pruža stacionarnu i ambulantnu rehabilitaciju: fizikalna terapija, kineziterapija, elektroterapija, hidroterapija i program oporavka nakon operacija i povreda."
meljine.rehabilitation.p2: "Prijem na rehabilitaciju vrši se sa uputom izabranog ljekara ili ljekara specijaliste. Program se prilagođava individualnim potrebama pacijenta."

meljine.location.title: "Lokacija"
meljine.location.p1: "Meljine, Herceg Novi. Objekat se nalazi na obali Bokokotorskog zaliva, u mirnom okruženju pogodnom za oporavak."
meljine.location.p2: "Od glavne bolnice u Škaljari, Kotor — 30 km glavnim putem kroz Risan. Iz centra Herceg Novog — 3 km."

meljine.hours.title: "Radno vrijeme"
meljine.hours.p1: "Stacionar: 24/7. Ambulantna rehabilitacija: pon–pet 07:00–15:00."
meljine.hours.p2: "Za ambulantne usluge potrebno je zakazivanje. Za stacionarni prijem potreban je uput."

meljine.contact.title: "Kontakt"
meljine.contact.p1: "Telefon: +382 31 672 272. Adresa: Meljine, Herceg Novi, Crna Gora."
meljine.contact.p2: "Za informacije o prijemu i zakazivanje rehabilitacije kontaktirajte recepciju filijale."

faq.page.description: "Česta pitanja o Opštoj bolnici Kotor — uputi, zakazivanje, osiguranje, inostrani pacijenti, parkiranje."
faq.badge: "Česta pitanja"
faq.title: "Česta pitanja"
faq.subtitle: "Odgovori na najčešća pitanja pacijenata."
faq.q1: "Da li mi je potreban uput?"
faq.a1: "Za specijalističke preglede i bolničko liječenje potreban je uput izabranog ljekara. Za hitnu pomoć uput nije potreban."
faq.q2: "Kako mogu zakazati pregled?"
faq.a2: "Pozovite recepciju bolnice na +382 32 325 602 ili se obratite lično. Za laboratorijske analize zakazivanje nije potrebno."
faq.q3: "Mogu li se liječiti bez zdravstvenog osiguranja?"
faq.a3: "Da. Pacijenti bez osiguranja plaćaju usluge prema cjenovniku. Hitna pomoć se pruža svima bez obzira na status osiguranja."
faq.q4: "Koji dokumenti su potrebni za strane državljane?"
faq.a4: "Pasoš i zdravstveno osiguranje (EKZO kartica za građane EU ili polisa privatnog osiguranja). Bez osiguranja — plaćanje po cjenovniku."
faq.q5: "Da li postoji parkiranje?"
faq.a5: "Da, besplatan parking je dostupan ispred bolnice. Broj mjesta je ograničen."
faq.q6: "Kakvo je radno vrijeme bolnice?"
faq.a6: "Hitna pomoć radi 24/7. Ambulante i laboratorija: pon–pet 07:00–15:00. Posjete pacijentima: svaki dan 14:00–16:00."
faq.q7: "Da li bolnica ima Wi-Fi?"
faq.a7: "Da, besplatan Wi-Fi je dostupan u čekaonicama i na odjelima."

news.page.description: "Novosti Opšte bolnice Kotor — projekti, oprema, obavještenja."
news.badge: "Novosti"
news.title: "Novosti"
news.subtitle: "Aktuelne informacije o radu i razvoju bolnice."
news.expansion.title: "Projekat proširenja — €9M"
news.expansion.p1: "U toku je najveći infrastrukturni projekat u istoriji bolnice. Gradi se novi objekat sa savremenim operacionim salama, intenzivnom njegom i dijagnostičkim centrom."
news.expansion.p2: "Očekivani završetak: 2026. Investicija od €9 miliona finansira se iz budžeta Crne Gore."
news.teledoc.title: "TELE.DOC — EU projekat"
news.teledoc.p1: "Prekogranični projekat Crna Gora–Hrvatska za razvoj telemedicinskih usluga. Budžet: €1,116M, finansiran iz IPA fondova EU."
news.teledoc.p2: "Projekat omogućava daljinske konsultacije i dijagnostiku za pacijente u udaljenim područjima."
news.equipment.title: "Nova oprema"
news.equipment.p1: "Bolnica kontinuirano ulaže u savremenu medicinsku opremu. Nedavno su nabavljeni novi ultrazvučni aparati i laboratorijska oprema."

prices.page.description: "Cjenovnik usluga Opšte bolnice Kotor — informacije o cijenama, osiguranju i plaćanju."
prices.badge: "Cjenovnik"
prices.title: "Cjenovnik usluga"
prices.subtitle: "Informacije o cijenama medicinskih usluga."
prices.fund.title: "Osiguranici Fonda"
prices.fund.p1: "Za osiguranike Fonda za zdravstveno osiguranje Crne Gore liječenje je besplatno u okviru ugovorenih usluga. Potreban je uput izabranog ljekara."
prices.selfpay.title: "Samoplata"
prices.selfpay.p1: "Pacijenti bez osiguranja plaćaju usluge prema cjenovniku bolnice. Cjenovnik je dostupan na recepciji."
prices.selfpay.p2: "Plaćanje se vrši prije ili prilikom otpusta. Prihvatamo gotovinu i platne kartice."
prices.info.title: "Kako saznati cijenu usluge"
prices.info.p1: "Za informacije o cijenama pojedinih usluga obratite se recepciji bolnice na +382 32 325 602 ili lično."
prices.info.p2: "Cijene zavise od vrste usluge, dijagnostike i trajanja liječenja. Konačan iznos utvrđuje se nakon pregleda."

careers.page.description: "Zapošljavanje u Opštoj bolnici Kotor — otvorene pozicije, uslovi rada, kontakt kadrovske službe."
careers.badge: "Zapošljavanje"
careers.title: "Zapošljavanje"
careers.subtitle: "Informacije o radu u bolnici i aktuelnim konkursima."
careers.about.title: "O radu u bolnici"
careers.about.p1: "Opšta bolnica Kotor zapošljava oko 250 radnika, uključujući ljekare, medicinske sestre, laborante i administrativno osoblje."
careers.about.p2: "Bolnica nudi stabilno zaposlenje u javnom sektoru, mogućnost stručnog usavršavanja i rad u multidisciplinarnom timu."
careers.openings.title: "Aktuelni konkursi"
careers.openings.p1: "Otvoreni konkursi objavljuju se na sajtu Zavoda za zapošljavanje Crne Gore i na oglasnoj tabli bolnice."
careers.openings.p2: "Potrebna dokumentacija: CV, diploma, licenca za rad (za medicinske radnike), uvjerenje o nekažnjavanju."
careers.contact.title: "Kontakt kadrovske službe"
careers.contact.p1: "Telefon: +382 32 325 602. Email: obk@t-com.me. Adresa: Škaljari bb, 85331 Kotor."
careers.contact.p2: "Za dodatne informacije o konkursima i uslovima zaposlenja obratite se kadrovskoj službi bolnice."

