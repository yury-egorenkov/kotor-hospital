dept.surgery.about.p1: "Odjeljenje opšte hirurgije jedno je od najvećih odjeljenja Opšte bolnice Kotor, sa 16 kreveta za stacionarno liječenje i dvije potpuno opremljene operacione sale. Odjeljenje obavlja elektivne i hitne hirurške intervencije, pokrivajući čitav spektar opšte hirurgije za stanovništvo Bokokotorskog zaliva."
dept.surgery.about.p2: "Bolničke sobe opremljene su za preoperativnu pripremu, postoperativni oporavak i kratkotrajni intenzivni nadzor. Operacione sale raspolažu savremenom anesteziološkom opremom, elektrohirurškim jedinicama i sistemima za monitoring pacijenata."
dept.surgery.about.p3: "Hitna hirurgija dostupna je 24/7 — hirurški tim uvijek je dežuran za akutna stanja uključujući apendicitis, ileus, traume i unutrašnje krvarenje. Elektivne operacije zakazuju se od ponedjeljka do petka."

