dept.emergency.phone: "+382 32 325 602"

dept.surgery.name: "Opšta hirurgija"
dept.surgery.desc: "Odjeljenje opšte hirurgije obavlja elektivne i hitne hirurške intervencije. Pokriva abdomenalnu hirurgiju, traumatologiju i manje operativne zahvate."
