about.stat.doctors: "ljekara"
about.stat.municipalities: "opštine"
about.stat.expansion: "proširenje"
about.project.expansion.title: "Proširenje bolnice — €9M"
about.project.expansion.desc: "Novi kapaciteti, savremena oprema i renovirani prostori za kvalitetnije usluge."
about.project.teledoc.title: "TELE.DOC — EU projekat, €1,116M"
about.project.teledoc.desc: "Razvoj telemedicine i digitalne zdravstvene zaštite u prekograničnom regionu."

about.page.description: "O Opštoj bolnici Kotor — istorija, misija, projekti, rukovodstvo i filijala Meljine."
about.subtitle: "Javna zdravstvena ustanova koja pruža medicinsku zaštitu stanovnicima opština Kotor, Tivat i Herceg Novi."
about.mission.title: "Misija"
about.mission.desc: "Opšta bolnica Kotor je centralna bolnička ustanova za Bokokotorski zaliv. Naša misija je pružanje kvalitetne, dostupne i savremene zdravstvene zaštite za preko 70.000 stanovnika tri priobalne opštine."
about.projects.title: "Projekti"
about.meljine.title: "Filijala Meljine"
about.meljine.desc: "Filijalni objekat u Meljinama, Herceg Novi, pruža rehabilitacione usluge i fizikalnu terapiju. Objekat dopunjuje kapacitete glavne bolnice u Škaljarima."
