dept.emergency.name: "Hitni prijem"
dept.emergency.desc: "Odjeljenje za hitni prijem pruža neodložnu medicinsku pomoć 24 sata dnevno, 7 dana u nedjelji. Opremljeno za zbrinjavanje svih hitnih stanja — od trauma do akutnih oboljenja."
