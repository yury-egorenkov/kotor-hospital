dept.gynecology.name: "Ginekologija i akušerstvo"
dept.gynecology.desc: "Kompletna ginekološka i akušerska zaštita — od prenatalnog praćenja do porođaja i ginekoloških operacija. Porodilište opremljeno za prirodne i operativne porođaje."
