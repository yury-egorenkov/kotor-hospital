clinic.surgery.service2: "Postoperativne kontrole i previjanje"
clinic.surgery.service3: "Manje hirurške intervencije (ambulantno)"
clinic.internal.detail: "Internistička ambulanta obavlja kardiološke, pulmološke i opšte internističke preglede. EKG dijagnostika, ultrazvuk i laboratorijska obrada dostupni na licu mjesta."
clinic.internal.service1: "EKG i kardiološki pregledi"
clinic.internal.service2: "Pulmološki pregledi i spirometrija"
clinic.internal.service3: "Opšti internistički pregled sa laboratorijom"
clinic.dermatology.detail: "Dermatološka ambulanta pruža preglede kože, dermatoskopiju madeža, liječenje kožnih oboljenja i savjetovanje o zaštiti kože. Dostupna i krioterapija."
clinic.dermatology.service1: "Dermatoskopija madeža i pigmentnih promjena"
clinic.dermatology.service2: "Liječenje ekcema, psorijaze i dermatitisa"
clinic.dermatology.service3: "Krioterapija i manje dermatohirurške intervencije"
clinic.ophthalmology.detail: "Oftalmološka ambulanta pruža kompletne preglede vida — mjerenje oštrine vida, očnog pritiska, pregled očnog dna i propisivanje korekcije. Rana dijagnostika glaukoma i katarakte."
clinic.ophthalmology.service1: "Mjerenje oštrine vida i refrakcije"
clinic.ophthalmology.service2: "Tonometrija (mjerenje očnog pritiska)"
clinic.ophthalmology.service3: "Pregled očnog dna i dijagnostika očnih bolesti"
clinic.endocrinology.detail: "Endokrinološka ambulanta bavi se dijagnostikom i liječenjem hormnonskih poremećaja — bolesti štitne žlijezde, dijabet, metabolički sindrom. Ultrazvuk štitne žlijezde na licu mjesta."
clinic.endocrinology.service1: "Dijagnostika i liječenje bolesti štitne žlijezde"
clinic.endocrinology.service2: "Kontrola dijabetesa i metaboličkog sindroma"
clinic.endocrinology.service3: "Ultrazvuk štitne žlijezde i hormonske analize"
clinic.gastroenterology.detail: "Gastroenterološka ambulanta pruža dijagnostiku i liječenje bolesti digestivnog sistema — gastroskopija, kolonoskopija, ultrazvuk abdomena. Skrining kolorektalnog karcinoma."
clinic.gastroenterology.service1: "Gastroskopija (ezofagogastroduodenoskopija)"
clinic.gastroenterology.service2: "Kolonoskopija i skrining debelog crijeva"
clinic.gastroenterology.service3: "Ultrazvuk abdomena i hepatobilijarna dijagnostika"
