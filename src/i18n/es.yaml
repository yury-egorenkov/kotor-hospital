about.mission.desc: "El Hospital General de Kotor es el centro hospitalario de referencia para la región de la bahía de Kotor. Nuestra misión es ofrecer atención sanitaria de calidad, accesible y moderna a más de 70.000 habitantes de tres municipios costeros."
