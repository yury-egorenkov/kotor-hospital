insurance.page.description: "Seguro médico en el Hospital General de Kotor — Fondo público, TSE, seguro privado y pago directo."
insurance.badge: "Seguro"
insurance.title: "Seguro Médico"
insurance.subtitle: "Qué tipos de seguro aceptamos y lo que necesita saber antes de su visita."

insurance.fond.title: "Fondo de Seguro Médico"
insurance.fond.p1: "El Hospital General de Kotor tiene convenio con el Fondo de Seguro Médico de Montenegro. Servicios cubiertos: urgencias, tratamiento hospitalario y ambulatorio, diagnóstico y rehabilitación."
insurance.fond.p2: "Necesitará su tarjeta de seguro médico (knjižica) y una derivación (uput) de su médico de cabecera. No se requiere derivación para urgencias."
insurance.fond.p3: "Para los residentes asegurados no hay costes adicionales — el tratamiento es gratuito dentro de los servicios contratados."

insurance.eu.title: "Tarjeta Sanitaria Europea — TSE"
insurance.eu.p1: "Los ciudadanos de la UE/EEE pueden usar la Tarjeta Sanitaria Europea (TSE). Cubre la atención médica de urgencia y los tratamientos médicamente necesarios durante su estancia."
insurance.eu.p2: "La TSE no cubre: procedimientos programados, repatriación ni tratamientos dentales electivos. Presente su tarjeta en recepción antes de iniciar el tratamiento."
insurance.eu.p3: "Sin tarjeta — los servicios se pagan íntegramente por adelantado y el reembolso se solicita en su país de origen."

insurance.private.title: "Seguro Privado"
insurance.private.p1: "El hospital acepta seguros médicos privados. Con algunas compañías es posible la facturación directa; en otros casos, se paga por adelantado y se solicita el reembolso."
insurance.private.p2: "Traiga la documentación de su póliza y un documento de identidad o pasaporte válido. Contacte con la recepción del hospital para la autorización previa."

insurance.selfpay.title: "Sin Seguro — Pago Directo"
insurance.selfpay.p1: "Los pacientes sin seguro pueden acceder a los servicios hospitalarios pagando según la lista de precios. La lista de precios está disponible en recepción."
insurance.selfpay.p2: "El pago se realiza antes o al alta. Aceptamos efectivo y tarjetas bancarias."
insurance.selfpay.p3: "La atención médica de urgencia se proporciona a todos los pacientes independientemente de su situación de seguro."

laboratory.page.description: "Laboratorio del Hospital General de Kotor — tipos de análisis, preparación, horarios, resultados y portal eZdravlje."
laboratory.badge: "Laboratorio"
laboratory.title: "Laboratorio"
laboratory.subtitle: "Tipos de análisis, preparación, horarios de atención y cómo obtener sus resultados."

laboratory.tests.title: "Tipos de Análisis"
laboratory.tests.p1: "Hematología (hemograma completo, coagulación, grupo sanguíneo), bioquímica (glucosa, lípidos, función hepática y renal, electrolitos) y análisis de orina."
laboratory.tests.p2: "Análisis adicionales disponibles con derivación del médico especialista."

laboratory.preparation.title: "Preparación"
laboratory.preparation.p1: "Los análisis de sangre requieren ayuno (8–12 horas sin comer, se permite agua). Se recomienda la extracción matutina (07:00–09:00)."
laboratory.preparation.p2: "Traiga su derivación y tarjeta de seguro médico. Informe al personal sobre los medicamentos que toma."

laboratory.hours.title: "Horario de Atención"
laboratory.hours.p1: "Lun–vie 07:00–15:00. Extracción de sangre: 07:00–09:00. Laboratorio de urgencias: 24/7 a través del servicio de urgencias."
laboratory.hours.p2: "No se necesita cita para análisis de sangre de rutina."

laboratory.results.title: "Resultados"
laboratory.results.p1: "Resultados de rutina: el mismo día o el siguiente día hábil. Análisis especializados: 3–5 días hábiles."
laboratory.results.p2: "Resultados disponibles a través del portal eZdravlje o en recepción. Los resultados urgentes se comunican directamente al médico que derivó al paciente."

laboratory.ezdravlje.title: "Portal eZdravlje"
laboratory.ezdravlje.p1: "Portal nacional de salud para acceder a resultados de análisis. Regístrese con su JMBG y número de tarjeta de seguro médico."
laboratory.ezdravlje.p2: "Consulte resultados de laboratorio, derivaciones y recetas en ezdravlje.me."

meljine.page.description: "Filial Meljine — servicios de rehabilitación, fisioterapia, ubicación, horarios y contacto."
meljine.badge: "Filial Meljine"
meljine.title: "Filial Meljine"
meljine.subtitle: "Centro de rehabilitación del Hospital General de Kotor en Herceg Novi."

meljine.rehabilitation.title: "Servicios de Rehabilitación"
meljine.rehabilitation.p1: "La filial ofrece rehabilitación hospitalaria y ambulatoria: fisioterapia, kinesiterapia, electroterapia, hidroterapia y programas de recuperación postoperatoria y postraumática."
meljine.rehabilitation.p2: "La admisión para rehabilitación requiere derivación del médico de cabecera o especialista. Los programas se adaptan a las necesidades individuales de cada paciente."

meljine.location.title: "Ubicación"
meljine.location.p1: "Meljine, Herceg Novi. El centro se encuentra en la orilla de la bahía de Kotor, en un entorno tranquilo ideal para la recuperación."
meljine.location.p2: "Desde el hospital principal en Škaljari, Kotor — 30 km por la carretera principal a través de Risan. Desde el centro de Herceg Novi — 3 km."

meljine.hours.title: "Horario de Atención"
meljine.hours.p1: "Hospitalización: 24/7. Rehabilitación ambulatoria: lun–vie 07:00–15:00."
meljine.hours.p2: "Los servicios ambulatorios requieren cita previa. La hospitalización requiere derivación médica."

meljine.contact.title: "Contacto"
meljine.contact.p1: "Teléfono: +382 31 672 272. Dirección: Meljine, Herceg Novi, Montenegro."
meljine.contact.p2: "Para información sobre admisión y programación de rehabilitación, contacte la recepción de la filial."

faq.page.description: "Preguntas frecuentes sobre el Hospital General de Kotor — derivaciones, citas, seguro, pacientes internacionales, aparcamiento."
faq.badge: "FAQ"
faq.title: "Preguntas Frecuentes"
faq.subtitle: "Respuestas a las preguntas más comunes de los pacientes."
faq.q1: "¿Necesito una derivación?"
faq.a1: "Para consultas con especialistas y tratamiento hospitalario se requiere derivación del médico de cabecera. Para urgencias no se necesita derivación."
faq.q2: "¿Cómo puedo pedir cita?"
faq.a2: "Llame a recepción al +382 32 325 602 o acuda personalmente. Para análisis de laboratorio no se necesita cita."
faq.q3: "¿Puedo recibir tratamiento sin seguro médico?"
faq.a3: "Sí. Los pacientes sin seguro pagan según la lista de precios. La atención de urgencia se presta a todos independientemente del seguro."
faq.q4: "¿Qué documentos necesitan los pacientes internacionales?"
faq.a4: "Pasaporte y seguro médico (tarjeta TSE para ciudadanos de la UE o póliza de seguro privado). Sin seguro — pago según lista de precios."
faq.q5: "¿Hay aparcamiento?"
faq.a5: "Sí, hay aparcamiento gratuito frente al hospital. El número de plazas es limitado."
faq.q6: "¿Cuál es el horario del hospital?"
faq.a6: "Urgencias funciona 24/7. Consultas externas y laboratorio: lun–vie 07:00–15:00. Visitas a pacientes: todos los días 14:00–16:00."
faq.q7: "¿Tiene el hospital Wi-Fi?"
faq.a7: "Sí, hay Wi-Fi gratuito en las salas de espera y en las plantas."

