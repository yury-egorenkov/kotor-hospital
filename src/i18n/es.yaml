about.badge: "Sobre nosotros"
about.title: "Sobre el hospital"
about.p1: "La institución pública de salud Hospital General de Kotor proporciona atención sanitaria a la población de los municipios de Kotor, Tivat y Herceg Novi — más de 70.000 habitantes de la bahía de Kotor."
about.p2: "El hospital cuenta con cinco departamentos de hospitalización y seis consultas especializadas. Además del edificio principal en Škaljari, el hospital gestiona una filial en Meljine que ofrece servicios de rehabilitación."
about.p3: "Actualmente se lleva a cabo un proyecto de ampliación valorado en 9 millones de euros, que mejorará significativamente las capacidades y la calidad de los servicios. El hospital también es socio del proyecto europeo TELE.DOC (1,116 M€) para el desarrollo de la telemedicina en la región."
