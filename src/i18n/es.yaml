news.subtitle: "Información actualizada sobre el funcionamiento y desarrollo del hospital."
news.expansion.title: "Proyecto de Ampliación — €9M"
news.expansion.p1: "Está en marcha el mayor proyecto de infraestructura en la historia del hospital. Se construye un nuevo edificio con quirófanos modernos, cuidados intensivos y centro de diagnóstico."
news.expansion.p2: "Finalización prevista: 2026. La inversión de €9 millones se financia con el presupuesto estatal de Montenegro."
news.teledoc.title: "TELE.DOC — Proyecto UE"
news.teledoc.p1: "Proyecto transfronterizo Montenegro–Croacia para el desarrollo de servicios de telemedicina. Presupuesto: €1,116M, financiado con fondos IPA de la UE."
news.teledoc.p2: "El proyecto permite consultas y diagnósticos a distancia para pacientes en zonas remotas."
news.equipment.title: "Nuevo Equipamiento"
news.equipment.p1: "El hospital invierte continuamente en equipamiento médico moderno. Recientemente se han adquirido nuevos ecógrafos y equipos de laboratorio."

prices.page.description: "Lista de precios del Hospital General de Kotor — información sobre precios, seguro y pago."
prices.badge: "Precios"
prices.title: "Precios de Servicios"
prices.subtitle: "Información sobre precios de servicios médicos."
prices.fund.title: "Pacientes con Seguro Público"
prices.fund.p1: "El tratamiento es gratuito para los asegurados del Fondo de Seguro Médico de Montenegro, dentro de los servicios contratados. Se requiere derivación del médico de cabecera."
prices.selfpay.title: "Pago Directo"
prices.selfpay.p1: "Los pacientes sin seguro pagan según la lista de precios del hospital. La lista de precios está disponible en recepción."
prices.selfpay.p2: "El pago se realiza antes o al alta. Aceptamos efectivo y tarjetas bancarias."
prices.info.title: "Cómo Conocer los Precios"
prices.info.p1: "Para información sobre precios de servicios específicos, contacte recepción: +382 32 325 602 o acuda personalmente."
prices.info.p2: "Los precios dependen del tipo de servicio, diagnóstico y duración del tratamiento. El importe final se determina tras la consulta."

careers.page.description: "Empleo en el Hospital General de Kotor — vacantes, condiciones laborales, contacto de RRHH."
careers.badge: "Empleo"
careers.title: "Empleo"
careers.subtitle: "Información sobre trabajar en el hospital y convocatorias actuales."
careers.about.title: "Trabajar en el Hospital"
careers.about.p1: "El Hospital General de Kotor emplea a unas 250 personas: médicos, enfermeros, técnicos de laboratorio y personal administrativo."
careers.about.p2: "El hospital ofrece empleo estable en el sector público, oportunidades de desarrollo profesional y trabajo en equipo multidisciplinar."
careers.openings.title: "Convocatorias Actuales"
careers.openings.p1: "Las vacantes se publican en la web de la Oficina de Empleo de Montenegro y en el tablón de anuncios del hospital."
careers.openings.p2: "Documentación requerida: currículum, título, licencia profesional (para personal sanitario), certificado de antecedentes penales."
careers.contact.title: "Contacto RRHH"
careers.contact.p1: "Teléfono: +382 32 325 602. Email: obk@t-com.me. Dirección: Škaljari bb, 85331 Kotor."
careers.contact.p2: "Para más información sobre vacantes y condiciones de empleo, contacte el departamento de RRHH del hospital."

