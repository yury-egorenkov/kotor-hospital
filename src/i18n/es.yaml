dept.emergency.name: "Urgencias"
dept.emergency.desc: "El servicio de urgencias ofrece atención médica de emergencia las 24 horas del día, los 7 días de la semana. Equipado para atender todo tipo de emergencias — desde traumatismos hasta enfermedades agudas."
dept.emergency.service1: "Triaje y diagnóstico de urgencias"
dept.emergency.service2: "Reanimación y cuidados intensivos"
dept.emergency.service3: "Atención de traumatismos y lesiones"
dept.emergency.hours: "Abierto: 0–24, todos los días"
dept.emergency.phone: "+382 32 325 602"

dept.surgery.name: "Cirugía general"
dept.surgery.desc: "El departamento de cirugía general realiza intervenciones quirúrgicas electivas y de urgencia. Abarca cirugía abdominal, traumatología e intervenciones quirúrgicas menores."
dept.surgery.service1: "Cirugía abdominal"
dept.surgery.service2: "Traumatología y ortopedia"
dept.surgery.service3: "Cirugía ambulatoria"
dept.surgery.hours: "Electiva: Lun–Vie, 07–15h"

dept.gynecology.name: "Ginecología y Obstetricia"
dept.gynecology.desc: "Atención ginecológica y obstétrica integral — desde el seguimiento prenatal hasta el parto y las operaciones ginecológicas. La maternidad está equipada para partos naturales y por cesárea."
dept.gynecology.service1: "Diagnóstico prenatal y seguimiento del embarazo"
dept.gynecology.service2: "Maternidad (parto natural y cesárea)"
dept.gynecology.service3: "Operaciones ginecológicas"
dept.gynecology.hours: "Urgencias: 0–24 / Consulta: Lun–Vie, 07–15h"

dept.internal.name: "Medicina interna"
dept.internal.desc: "El departamento de medicina interna se ocupa del diagnóstico y tratamiento de enfermedades de los órganos internos — sistema cardiovascular, neumología, gastroenterología, endocrinología."
dept.internal.service1: "Cardiología y diagnóstico por ECG"
dept.internal.service2: "Gastroenterología y endoscopia"
dept.internal.service3: "Endocrinología y diabetología"
dept.internal.hours: "Hospitalización: 0–24 / Consulta: Lun–Vie, 07–15h"

dept.radiology.name: "Radiología"
dept.radiology.desc: "El departamento de radiología ofrece apoyo diagnóstico completo al hospital — radiografías, ecografía, diagnóstico por TC."
dept.radiology.service1: "Radiografía digital"
dept.radiology.service2: "Diagnóstico por ecografía"
dept.radiology.service3: "Tomografía computarizada (TC)"
dept.radiology.hours: "Lun–Vie, 07–20h / Sáb, 08–14h"

