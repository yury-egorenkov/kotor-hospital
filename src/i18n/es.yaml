clinic.surgery.name: "Consulta de cirugía"
clinic.surgery.desc: "Exámenes, controles e intervenciones quirúrgicas menores."
clinic.internal.name: "Consulta de medicina interna"
clinic.internal.desc: "Exámenes cardiológicos, neumológicos e internistas generales."
clinic.dermatology.name: "Dermatología"
clinic.dermatology.desc: "Exámenes de piel, dermatoscopia, tratamiento de enfermedades cutáneas."
clinic.ophthalmology.name: "Oftalmología"
clinic.ophthalmology.desc: "Examen de visión, medición de presión intraocular, examen de fondo de ojo."
clinic.endocrinology.name: "Endocrinología"
clinic.endocrinology.desc: "Tiroides, diabetes, trastornos hormonales."
clinic.gastroenterology.name: "Gastroenterología"
clinic.gastroenterology.desc: "Sistema digestivo, gastroscopia, colonoscopia, ecografía abdominal."

clinic.surgery.detail: "La clínica quirúrgica ofrece consultas especializadas, seguimientos postoperatorios e intervenciones quirúrgicas menores de forma ambulatoria. Opera como parte del departamento de cirugía del hospital."
clinic.surgery.service1: "Consultas y preparación preoperatoria"
clinic.surgery.service2: "Seguimientos postoperatorios y curas"
clinic.surgery.service3: "Intervenciones quirúrgicas menores (ambulatorio)"
clinic.internal.detail: "La clínica de medicina interna realiza exámenes cardiológicos, neumológicos y de medicina interna general. Diagnóstico por ECG, ecografía y análisis de laboratorio disponibles in situ."
clinic.internal.service1: "ECG y exámenes cardiológicos"
clinic.internal.service2: "Exámenes neumológicos y espirometría"
clinic.internal.service3: "Examen de medicina interna general con laboratorio"
clinic.dermatology.detail: "La clínica de dermatología ofrece exámenes de piel, dermatoscopia de lunares, tratamiento de afecciones cutáneas y asesoramiento sobre el cuidado de la piel. Crioterapia también disponible."
clinic.dermatology.service1: "Dermatoscopia de lunares y lesiones pigmentadas"
clinic.dermatology.service2: "Tratamiento de eccema, psoriasis y dermatitis"
clinic.dermatology.service3: "Crioterapia y procedimientos dermatoquirúrgicos menores"
clinic.ophthalmology.detail: "La clínica de oftalmología ofrece exámenes oculares completos — prueba de agudeza visual, medición de presión intraocular, fundoscopia y prescripción de lentes correctivas. Diagnóstico precoz de glaucoma y cataratas."
clinic.ophthalmology.service1: "Prueba de agudeza visual y refracción"
clinic.ophthalmology.service2: "Tonometría (medición de presión intraocular)"
clinic.ophthalmology.service3: "Fundoscopia y diagnóstico de enfermedades oculares"
clinic.endocrinology.detail: "La clínica de endocrinología se ocupa del diagnóstico y tratamiento de trastornos hormonales — enfermedades tiroideas, diabetes, síndrome metabólico. Ecografía tiroidea disponible in situ."
clinic.endocrinology.service1: "Diagnóstico y tratamiento de enfermedades tiroideas"
clinic.endocrinology.service2: "Control de diabetes y síndrome metabólico"
clinic.endocrinology.service3: "Ecografía tiroidea y análisis hormonales"
clinic.gastroenterology.detail: "La clínica de gastroenterología ofrece diagnóstico y tratamiento de enfermedades del sistema digestivo — gastroscopia, colonoscopia, ecografía abdominal. Cribado de cáncer colorrectal."
clinic.gastroenterology.service1: "Gastroscopia (esofagogastroduodenoscopia)"
clinic.gastroenterology.service2: "Colonoscopia y cribado de colon"
clinic.gastroenterology.service3: "Ecografía abdominal y diagnóstico hepatobiliar"
