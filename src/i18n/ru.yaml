dept.gynecology.name: "Гинекология и акушерство"
dept.gynecology.desc: "Полный спектр гинекологической и акушерской помощи — от пренатального наблюдения до родов и гинекологических операций. Родильное отделение оснащено для естественных и оперативных родов."
