dept.emergency.name: "Приёмное отделение"
dept.emergency.desc: "Отделение экстренной помощи оказывает неотложную медицинскую помощь 24 часа в сутки, 7 дней в неделю. Оснащено для оказания помощи при всех неотложных состояниях — от травм до острых заболеваний."
