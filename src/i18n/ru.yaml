about.badge: "О нас"
about.title: "О больнице"
about.p1: "Государственное учреждение здравоохранения — Общая больница Котор — оказывает медицинскую помощь населению общин Котор, Тиват и Герцег-Нови, обслуживая более 70 000 жителей Которского залива."
about.p2: "Больница располагает пятью стационарными отделениями и шестью специализированными амбулаториями. Помимо главного корпуса в Шкалярах, больница управляет филиалом в Мелине, оказывающим реабилитационные услуги."
about.p3: "Реализуется проект расширения больницы стоимостью €9 миллионов, который значительно улучшит мощности и качество услуг. Больница также является партнёром в проекте ЕС TELE.DOC (€1,116M) по развитию телемедицины в регионе."
about.stat.employees: "сотрудников"
about.stat.doctors: "врачей"
about.stat.municipalities: "общины"
about.stat.expansion: "расширение"
about.project.expansion.title: "Расширение больницы — €9M"
about.project.expansion.desc: "Новые мощности, современное оборудование и обновлённые помещения для повышения качества услуг."
about.project.teledoc.title: "TELE.DOC — проект ЕС, €1,116M"
about.project.teledoc.desc: "Развитие телемедицины и цифрового здравоохранения в трансграничном регионе."

about.page.description: "Об Общей больнице Котор — история, миссия, проекты, руководство и филиал Мелине."
about.subtitle: "Государственное учреждение здравоохранения, оказывающее медицинскую помощь жителям общин Котор, Тиват и Герцег-Нови."
about.mission.title: "Миссия"
about.mission.desc: "Общая больница Котор — центральное больничное учреждение для региона Которского залива. Наша миссия — оказание качественной, доступной и современной медицинской помощи более чем 70 000 жителей трёх прибрежных общин."
about.projects.title: "Проекты"
about.meljine.title: "Филиал Мелине"
about.meljine.desc: "Филиальный объект в Мелине, Герцег-Нови, оказывает реабилитационные услуги и физиотерапию. Объект дополняет мощности основной больницы в Шкалярах."
