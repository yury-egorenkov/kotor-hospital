insurance.page.description: "Медицинское страхование в Общей больнице Котора — Фонд, ЕКМС, частное страхование и самоплата."
insurance.badge: "Страхование"
insurance.title: "Медицинское страхование"
insurance.subtitle: "Какие виды страхования мы принимаем и что нужно знать перед визитом."

insurance.fond.title: "Фонд медицинского страхования"
insurance.fond.p1: "Общая больница Котора имеет договор с Фондом медицинского страхования Черногории. Покрываются: скорая помощь, стационарное и амбулаторное лечение, диагностика и реабилитация."
insurance.fond.p2: "Необходимо иметь при себе медицинскую книжку (књижица) и направление (упут) от лечащего врача. Для экстренных случаев направление не требуется."
insurance.fond.p3: "Для застрахованных жителей лечение бесплатно в рамках договорных услуг — дополнительных расходов нет."

insurance.eu.title: "Европейская карта — ЕКМС / EHIC"
insurance.eu.p1: "Граждане ЕС/ЕЭЗ могут использовать Европейскую карту медицинского страхования (ЕКМС/EHIC). Покрывается экстренная и медицински необходимая помощь во время пребывания."
insurance.eu.p2: "ЕКМС не покрывает: плановые процедуры, репатриацию, элективную стоматологию. Предъявите карту на рецепции до начала лечения."
insurance.eu.p3: "Без карты — услуги оплачиваются полностью, возмещение запрашивается в стране проживания."

insurance.private.title: "Частное страхование"
insurance.private.p1: "Больница принимает частное медицинское страхование. С рядом компаний возможен прямой расчёт; в остальных случаях оплата производится заранее с последующим возмещением."
insurance.private.p2: "Возьмите с собой полис страхования и удостоверение личности или паспорт. Для предварительного согласования свяжитесь с рецепцией больницы."

insurance.selfpay.title: "Без страховки — самоплата"
insurance.selfpay.p1: "Пациенты без страхования могут воспользоваться услугами больницы с оплатой по прейскуранту. Прейскурант доступен на рецепции."
insurance.selfpay.p2: "Оплата производится до или при выписке. Принимаем наличные и банковские карты."
insurance.selfpay.p3: "Экстренная медицинская помощь оказывается всем пациентам независимо от наличия страховки."

laboratory.page.description: "Лаборатория Общей больницы Котора — виды анализов, подготовка, график работы, результаты и портал eZdravlje."
laboratory.badge: "Лаборатория"
laboratory.title: "Лаборатория"
laboratory.subtitle: "Виды анализов, подготовка к сдаче, график работы и получение результатов."

laboratory.tests.title: "Виды анализов"
laboratory.tests.p1: "Гематология (общий анализ крови, коагулограмма, группа крови), биохимия (глюкоза, липиды, функция печени и почек, электролиты) и анализ мочи."
laboratory.tests.p2: "Дополнительные анализы доступны по направлению врача-специалиста."

laboratory.preparation.title: "Подготовка к анализам"
laboratory.preparation.p1: "Кровь сдаётся натощак (8–12 часов без еды, вода допускается). Рекомендуется утренний забор (07:00–09:00)."
laboratory.preparation.p2: "Возьмите с собой направление и карту медицинского страхования. Сообщите персоналу о принимаемых лекарствах."

laboratory.hours.title: "График работы"
laboratory.hours.p1: "Пн–пт 07:00–15:00. Забор крови: 07:00–09:00. Экстренная лаборатория: круглосуточно через приёмное отделение."
laboratory.hours.p2: "Для плановых анализов крови запись не требуется."

laboratory.results.title: "Результаты"
laboratory.results.p1: "Плановые результаты: в тот же день или на следующий рабочий день. Специализированные анализы: 3–5 рабочих дней."
laboratory.results.p2: "Результаты доступны через портал eZdravlje или на рецепции. Срочные результаты передаются непосредственно направившему врачу."

laboratory.ezdravlje.title: "Портал eZdravlje"
laboratory.ezdravlje.p1: "Национальный медицинский портал для доступа к результатам анализов. Регистрация по JMBG и номеру карты медицинского страхования."
laboratory.ezdravlje.p2: "Просматривайте результаты анализов, направления и рецепты на ezdravlje.me."

meljine.page.description: "Филиал Мелине — реабилитационные услуги, физиотерапия, расположение, график работы и контакты."
meljine.badge: "Филиал Мелине"
meljine.title: "Филиал Мелине"
meljine.subtitle: "Реабилитационный центр Общей больницы Котора в Герцег-Нови."

meljine.rehabilitation.title: "Реабилитационные услуги"
meljine.rehabilitation.p1: "Филиал оказывает стационарную и амбулаторную реабилитацию: физиотерапия, кинезитерапия, электротерапия, гидротерапия и программы восстановления после операций и травм."
meljine.rehabilitation.p2: "Приём на реабилитацию осуществляется по направлению лечащего врача или специалиста. Программа подбирается индивидуально для каждого пациента."

meljine.location.title: "Расположение"
meljine.location.p1: "Мелине, Герцег-Нови. Учреждение расположено на берегу Бока-Которского залива, в спокойной обстановке, идеальной для восстановления."
meljine.location.p2: "От основной больницы в Шкалярах, Котор — 30 км по главной дороге через Рисан. Из центра Герцег-Нови — 3 км."

meljine.hours.title: "График работы"
meljine.hours.p1: "Стационар: круглосуточно. Амбулаторная реабилитация: пн–пт 07:00–15:00."
meljine.hours.p2: "Амбулаторные услуги — по предварительной записи. Для стационарного приёма необходимо направление."

meljine.contact.title: "Контакты"
meljine.contact.p1: "Телефон: +382 31 672 272. Адрес: Мелине, Герцег-Нови, Черногория."
meljine.contact.p2: "По вопросам госпитализации и записи на реабилитацию обращайтесь на рецепцию филиала."

