insurance.page.description: "Krankenversicherung im Allgemeinen Krankenhaus Kotor — Gesetzliche Versicherung, EHIC, Privatversicherung und Selbstzahlung."
insurance.badge: "Versicherung"
insurance.title: "Krankenversicherung"
insurance.subtitle: "Welche Versicherungsarten wir akzeptieren und was Sie vor Ihrem Besuch wissen sollten."

insurance.fond.title: "Gesetzliche Krankenversicherung"
insurance.fond.p1: "Das Allgemeine Krankenhaus Kotor hat einen Vertrag mit dem Krankenversicherungsfonds Montenegros. Abgedeckt sind: Notfallversorgung, stationäre und ambulante Behandlung, Diagnostik und Rehabilitation."
insurance.fond.p2: "Bringen Sie Ihre Versicherungskarte (knjižica) und eine Überweisung (uput) Ihres Hausarztes mit. Für Notfälle ist keine Überweisung erforderlich."
insurance.fond.p3: "Für versicherte Einwohner entstehen keine zusätzlichen Kosten — die Behandlung ist im Rahmen der Vertragsleistungen kostenlos."

insurance.eu.title: "Europäische Krankenversicherungskarte — EHIC"
insurance.eu.p1: "EU/EWR-Bürger können die Europäische Krankenversicherungskarte (EHIC) verwenden. Abgedeckt sind Notfallversorgung und medizinisch notwendige Behandlungen während Ihres Aufenthalts."
insurance.eu.p2: "Die EHIC deckt nicht ab: geplante Eingriffe, Rückführung, elektive Zahnbehandlungen. Legen Sie Ihre Karte vor Behandlungsbeginn an der Rezeption vor."
insurance.eu.p3: "Ohne Karte — Leistungen müssen vollständig im Voraus bezahlt werden, die Erstattung erfolgt im Heimatland."

insurance.private.title: "Privatversicherung"
insurance.private.p1: "Das Krankenhaus akzeptiert private Krankenversicherungen. Mit ausgewählten Unternehmen ist eine Direktabrechnung möglich; bei anderen erfolgt die Zahlung im Voraus mit anschließender Erstattung."
insurance.private.p2: "Bringen Sie Ihre Versicherungsunterlagen und einen gültigen Ausweis oder Reisepass mit. Für eine Vorabgenehmigung wenden Sie sich an die Rezeption."

insurance.selfpay.title: "Ohne Versicherung — Selbstzahlung"
insurance.selfpay.p1: "Patienten ohne Versicherung können Krankenhausleistungen gegen Bezahlung gemäß Preisliste nutzen. Die Preisliste ist an der Rezeption erhältlich."
insurance.selfpay.p2: "Die Zahlung erfolgt vor oder bei der Entlassung. Wir akzeptieren Bargeld und Bankkarten."
insurance.selfpay.p3: "Notfallmedizinische Versorgung wird allen Patienten unabhängig vom Versicherungsstatus gewährt."

