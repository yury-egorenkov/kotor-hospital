about.stat.doctors: "Ärzte"
about.stat.municipalities: "Gemeinden"
about.stat.expansion: "Erweiterung"
about.project.expansion.title: "Krankenhauserweiterung — 9 Mio. €"
about.project.expansion.desc: "Neue Kapazitäten, moderne Ausstattung und renovierte Räumlichkeiten für bessere Leistungen."
about.project.teledoc.title: "TELE.DOC — EU-Projekt, 1,116 Mio. €"
about.project.teledoc.desc: "Entwicklung der Telemedizin und digitalen Gesundheitsversorgung in der grenzüberschreitenden Region."

about.page.description: "Über das Allgemeine Krankenhaus Kotor — Geschichte, Mission, Projekte, Leitung und Filiale Meljine."
about.subtitle: "Öffentliche Gesundheitseinrichtung für die medizinische Versorgung der Gemeinden Kotor, Tivat und Herceg Novi."
about.mission.title: "Mission"
about.mission.desc: "Das Allgemeine Krankenhaus Kotor ist die zentrale Krankenhauseinrichtung für die Region der Bucht von Kotor. Unsere Mission ist die Bereitstellung einer qualitativ hochwertigen, zugänglichen und modernen Gesundheitsversorgung für über 70.000 Einwohner dreier Küstengemeinden."
about.projects.title: "Projekte"
about.meljine.title: "Filiale Meljine"
about.meljine.desc: "Die Filiale in Meljine, Herceg Novi, bietet Rehabilitationsleistungen und Physiotherapie an. Sie ergänzt die Kapazitäten des Hauptkrankenhauses in Škaljari."
