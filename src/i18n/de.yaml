dept.gynecology.desc: "Umfassende gynäkologische und geburtshilfliche Versorgung — von der pränatalen Betreuung über die Entbindung bis hin zu gynäkologischen Operationen. Der Kreißsaal ist für natürliche und operative Entbindungen ausgestattet."
