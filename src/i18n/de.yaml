laboratory.tests.title: "Testarten"
laboratory.tests.p1: "Hämatologie (großes Blutbild, Gerinnung, Blutgruppe), Biochemie (Glukose, Lipide, Leber- und Nierenfunktion, Elektrolyte) und Urinanalyse."
laboratory.tests.p2: "Weitere Untersuchungen auf Überweisung durch Fachärzte möglich."

laboratory.preparation.title: "Vorbereitung"
laboratory.preparation.p1: "Blutentnahme nüchtern (8–12 Stunden ohne Essen, Wasser erlaubt). Morgendliche Probenentnahme empfohlen (07:00–09:00)."
laboratory.preparation.p2: "Bringen Sie Ihre Überweisung und Krankenversicherungskarte mit. Informieren Sie das Personal über eingenommene Medikamente."

laboratory.hours.title: "Öffnungszeiten"
laboratory.hours.p1: "Mo–Fr 07:00–15:00. Blutentnahme: 07:00–09:00. Notfalllabor: rund um die Uhr über die Notaufnahme."
laboratory.hours.p2: "Für routinemäßige Blutuntersuchungen ist keine Terminvereinbarung erforderlich."

laboratory.results.title: "Ergebnisse"
laboratory.results.p1: "Routineergebnisse: am selben Tag oder am nächsten Werktag. Spezialuntersuchungen: 3–5 Werktage."
laboratory.results.p2: "Ergebnisse über das eZdravlje-Portal oder an der Rezeption erhältlich. Dringende Ergebnisse werden direkt an den überweisenden Arzt übermittelt."

laboratory.ezdravlje.title: "eZdravlje-Portal"
laboratory.ezdravlje.p1: "Nationales Gesundheitsportal für den Zugang zu Untersuchungsergebnissen. Registrierung mit JMBG und Krankenversicherungskartennummer."
laboratory.ezdravlje.p2: "Laborergebnisse, Überweisungen und Rezepte einsehen auf ezdravlje.me."

meljine.page.description: "Filiale Meljine — Rehabilitationsleistungen, Physiotherapie, Standort, Öffnungszeiten und Kontakt."
meljine.badge: "Filiale Meljine"
meljine.title: "Filiale Meljine"
meljine.subtitle: "Rehabilitationszentrum des Allgemeinen Krankenhauses Kotor in Herceg Novi."

meljine.rehabilitation.title: "Rehabilitationsleistungen"
meljine.rehabilitation.p1: "Die Filiale bietet stationäre und ambulante Rehabilitation: Physiotherapie, Kinesiotherapie, Elektrotherapie, Hydrotherapie sowie Programme zur Genesung nach Operationen und Verletzungen."
meljine.rehabilitation.p2: "Die Aufnahme zur Rehabilitation erfolgt mit Überweisung des Hausarztes oder Facharztes. Das Programm wird individuell auf die Bedürfnisse des Patienten abgestimmt."

meljine.location.title: "Standort"
meljine.location.p1: "Meljine, Herceg Novi. Die Einrichtung liegt am Ufer der Bucht von Kotor, in einer ruhigen Umgebung, die ideal für die Genesung ist."
meljine.location.p2: "Vom Hauptkrankenhaus in Škaljari, Kotor — 30 km über die Hauptstraße durch Risan. Vom Zentrum Herceg Novis — 3 km."

meljine.hours.title: "Öffnungszeiten"
meljine.hours.p1: "Stationärer Bereich: rund um die Uhr. Ambulante Rehabilitation: Mo–Fr 07:00–15:00."
meljine.hours.p2: "Ambulante Leistungen nur nach Terminvereinbarung. Für die stationäre Aufnahme ist eine Überweisung erforderlich."

meljine.contact.title: "Kontakt"
meljine.contact.p1: "Telefon: +382 31 672 272. Adresse: Meljine, Herceg Novi, Montenegro."
meljine.contact.p2: "Für Aufnahmeinformationen und Rehabilitationstermine wenden Sie sich an die Rezeption der Filiale."

faq.page.description: "Häufig gestellte Fragen zum Allgemeinen Krankenhaus Kotor — Überweisungen, Termine, Versicherung, internationale Patienten, Parken."
faq.badge: "FAQ"
faq.title: "Häufig gestellte Fragen"
faq.subtitle: "Antworten auf die häufigsten Patientenfragen."
faq.q1: "Brauche ich eine Überweisung?"
faq.a1: "Für Facharztbesuche und stationäre Behandlung ist eine Überweisung des Hausarztes erforderlich. Für die Notaufnahme ist keine Überweisung nötig."
faq.q2: "Wie kann ich einen Termin vereinbaren?"
faq.a2: "Rufen Sie die Rezeption unter +382 32 325 602 an oder kommen Sie persönlich. Für Laboruntersuchungen ist keine Terminvereinbarung nötig."
faq.q3: "Kann ich mich ohne Krankenversicherung behandeln lassen?"
faq.a3: "Ja. Patienten ohne Versicherung zahlen nach Preisliste. Notfallversorgung wird jedem unabhängig vom Versicherungsstatus gewährt."
faq.q4: "Welche Unterlagen benötigen internationale Patienten?"
faq.a4: "Reisepass und Krankenversicherung (EHIC-Karte für EU-Bürger oder private Versicherungspolice). Ohne Versicherung — Zahlung nach Preisliste."
faq.q5: "Gibt es Parkmöglichkeiten?"
faq.a5: "Ja, kostenlose Parkplätze stehen vor dem Krankenhaus zur Verfügung. Die Anzahl ist begrenzt."
faq.q6: "Wie sind die Öffnungszeiten?"
faq.a6: "Die Notaufnahme ist rund um die Uhr geöffnet. Ambulanzen und Labor: Mo–Fr 07:00–15:00. Patientenbesuche: täglich 14:00–16:00."
faq.q7: "Gibt es WLAN im Krankenhaus?"
faq.a7: "Ja, kostenloses WLAN ist in den Wartebereichen und auf den Stationen verfügbar."

news.page.description: "Neuigkeiten des Allgemeinen Krankenhauses Kotor — Projekte, Ausstattung, Bekanntmachungen."
news.badge: "Neuigkeiten"
news.title: "Neuigkeiten"
news.subtitle: "Aktuelle Informationen über den Betrieb und die Entwicklung des Krankenhauses."
news.expansion.title: "Erweiterungsprojekt — €9M"
news.expansion.p1: "Das größte Infrastrukturprojekt in der Geschichte des Krankenhauses ist im Gange. Ein neues Gebäude mit modernen Operationssälen, Intensivstation und Diagnosezentrum wird errichtet."
news.expansion.p2: "Voraussichtliche Fertigstellung: 2026. Die Investition von €9 Mio. wird aus dem montenegrinischen Staatshaushalt finanziert."
news.teledoc.title: "TELE.DOC — EU-Projekt"
news.teledoc.p1: "Ein grenzüberschreitendes Projekt Montenegro–Kroatien zur Entwicklung telemedizinischer Dienste. Budget: €1,116 Mio., finanziert aus EU-IPA-Mitteln."
news.teledoc.p2: "Das Projekt ermöglicht Fernkonsultationen und Diagnostik für Patienten in abgelegenen Gebieten."
news.equipment.title: "Neue Ausstattung"
news.equipment.p1: "Das Krankenhaus investiert kontinuierlich in moderne medizinische Ausstattung. Kürzlich wurden neue Ultraschallgeräte und Laborausrüstung angeschafft."

prices.page.description: "Preisliste des Allgemeinen Krankenhauses Kotor — Informationen zu Preisen, Versicherung und Zahlung."
prices.badge: "Preise"
prices.title: "Preisliste"
prices.subtitle: "Informationen zur Preisgestaltung medizinischer Leistungen."
prices.fund.title: "Gesetzlich Versicherte"
prices.fund.p1: "Für Versicherte der montenegrinischen Krankenversicherung ist die Behandlung im Rahmen der Vertragsleistungen kostenlos. Eine Überweisung des Hausarztes ist erforderlich."
prices.selfpay.title: "Selbstzahlung"
prices.selfpay.p1: "Patienten ohne Versicherung zahlen nach der Preisliste des Krankenhauses. Die Preisliste ist an der Rezeption erhältlich."
prices.selfpay.p2: "Die Zahlung erfolgt vor oder bei Entlassung. Wir akzeptieren Bargeld und Bankkarten."
prices.info.title: "Preisauskunft"
prices.info.p1: "Für Preisinformationen zu einzelnen Leistungen wenden Sie sich an die Rezeption: +382 32 325 602 oder persönlich."
prices.info.p2: "Die Preise hängen von Art der Leistung, Diagnostik und Behandlungsdauer ab. Der endgültige Betrag wird nach der Untersuchung festgelegt."

careers.page.description: "Karriere am Allgemeinen Krankenhaus Kotor — offene Stellen, Arbeitsbedingungen, Kontakt der Personalabteilung."
careers.badge: "Karriere"
careers.title: "Karriere"
careers.subtitle: "Informationen zur Arbeit im Krankenhaus und aktuellen Stellenausschreibungen."
careers.about.title: "Arbeiten im Krankenhaus"
careers.about.p1: "Das Allgemeine Krankenhaus Kotor beschäftigt rund 250 Mitarbeiter: Ärzte, Pflegekräfte, Laboranten und Verwaltungspersonal."
careers.about.p2: "Das Krankenhaus bietet eine stabile Beschäftigung im öffentlichen Dienst, Möglichkeiten zur Weiterbildung und Arbeit in einem multidisziplinären Team."
careers.openings.title: "Aktuelle Stellenausschreibungen"
careers.openings.p1: "Offene Stellen werden auf der Website der Arbeitsverwaltung Montenegros und am Schwarzen Brett des Krankenhauses veröffentlicht."
careers.openings.p2: "Erforderliche Unterlagen: Lebenslauf, Diplom, Berufslizenz (für medizinisches Personal), Führungszeugnis."
careers.contact.title: "Kontakt Personalabteilung"
careers.contact.p1: "Telefon: +382 32 325 602. E-Mail: obk@t-com.me. Adresse: Škaljari bb, 85331 Kotor."
careers.contact.p2: "Für weitere Informationen zu Stellenangeboten und Beschäftigungsbedingungen wenden Sie sich an die Personalabteilung."

