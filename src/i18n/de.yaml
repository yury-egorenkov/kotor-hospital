dept.emergency.name: "Notaufnahme"
dept.emergency.desc: "Die Notaufnahme bietet rund um die Uhr medizinische Notfallversorgung, 7 Tage die Woche. Ausgestattet für die Behandlung aller Notfälle — von Traumata bis zu akuten Erkrankungen."
