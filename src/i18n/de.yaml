about.badge: "Über uns"
about.title: "Über das Krankenhaus"
about.p1: "Die Öffentliche Gesundheitseinrichtung Allgemeines Krankenhaus Kotor bietet medizinische Versorgung für die Bevölkerung der Gemeinden Kotor, Tivat und Herceg Novi — insgesamt über 70.000 Einwohner der Bucht von Kotor."
about.p2: "Das Krankenhaus verfügt über fünf stationäre Abteilungen und sechs Facharztambulanzen. Neben dem Hauptgebäude in Škaljari betreibt das Krankenhaus eine Filiale in Meljine, die Rehabilitationsleistungen anbietet."
about.p3: "Derzeit läuft ein Erweiterungsprojekt im Wert von 9 Millionen Euro, das die Kapazitäten und die Qualität der Leistungen erheblich verbessern wird. Das Krankenhaus ist zudem Partner im EU-Projekt TELE.DOC (1,116 Mio. €) zur Entwicklung der Telemedizin in der Region."
about.stat.employees: "Mitarbeiter"
about.stat.doctors: "Ärzte"
about.stat.municipalities: "Gemeinden"
about.stat.expansion: "Erweiterung"
about.project.expansion.title: "Krankenhauserweiterung — 9 Mio. €"
about.project.expansion.desc: "Neue Kapazitäten, moderne Ausstattung und renovierte Räumlichkeiten für bessere Leistungen."
about.project.teledoc.title: "TELE.DOC — EU-Projekt, 1,116 Mio. €"
about.project.teledoc.desc: "Entwicklung der Telemedizin und digitalen Gesundheitsversorgung in der grenzüberschreitenden Region."

