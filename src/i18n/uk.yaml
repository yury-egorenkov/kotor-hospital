clinic.gastroenterology.name: "Гастроентерологія"
clinic.gastroenterology.desc: "Травна система, гастроскопія, колоноскопія, УЗД черевної порожнини."

clinic.surgery.detail: "Хірургічна амбулаторія проводить спеціалізовані огляди, післяопераційні контролі та малі хірургічні втручання в амбулаторних умовах. Працює у складі хірургічного відділення лікарні."
clinic.surgery.service1: "Передопераційні огляди та підготовка"
clinic.surgery.service2: "Післяопераційні контролі та перев'язки"
clinic.surgery.service3: "Малі хірургічні втручання (амбулаторно)"
clinic.internal.detail: "Терапевтична амбулаторія проводить кардіологічні, пульмонологічні та загальнотерапевтичні огляди. ЕКГ-діагностика, УЗД та лабораторні аналізи доступні на місці."
clinic.internal.service1: "ЕКГ та кардіологічні огляди"
clinic.internal.service2: "Пульмонологічні огляди та спірометрія"
clinic.internal.service3: "Загальнотерапевтичний огляд з лабораторією"
clinic.dermatology.detail: "Дерматологічна амбулаторія проводить огляди шкіри, дерматоскопію родимок, лікування шкірних захворювань та консультації з догляду за шкірою. Доступна кріотерапія."
clinic.dermatology.service1: "Дерматоскопія родимок та пігментних утворень"
clinic.dermatology.service2: "Лікування екземи, псоріазу та дерматиту"
clinic.dermatology.service3: "Кріотерапія та малі дерматохірургічні процедури"
clinic.ophthalmology.detail: "Офтальмологічна амбулаторія проводить повні огляди зору — перевірка гостроти зору, вимірювання внутрішньоочного тиску, огляд очного дна та підбір корекції. Рання діагностика глаукоми та катаракти."
clinic.ophthalmology.service1: "Перевірка гостроти зору та рефракції"
clinic.ophthalmology.service2: "Тонометрія (вимірювання внутрішньоочного тиску)"
clinic.ophthalmology.service3: "Огляд очного дна та діагностика захворювань очей"
clinic.endocrinology.detail: "Ендокринологічна амбулаторія займається діагностикою та лікуванням гормональних порушень — захворювання щитоподібної залози, діабет, метаболічний синдром. УЗД щитоподібної залози на місці."
clinic.endocrinology.service1: "Діагностика та лікування захворювань щитоподібної залози"
clinic.endocrinology.service2: "Контроль діабету та метаболічного синдрому"
clinic.endocrinology.service3: "УЗД щитоподібної залози та гормональні аналізи"
clinic.gastroenterology.detail: "Гастроентерологічна амбулаторія проводить діагностику та лікування захворювань травної системи — гастроскопія, колоноскопія, УЗД черевної порожнини. Скринінг колоректального раку."
