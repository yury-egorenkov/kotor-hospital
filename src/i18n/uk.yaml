about.badge: "Про нас"
about.title: "Про лікарню"
about.p1: "Публічний медичний заклад Загальна лікарня Котор надає медичну допомогу населенню муніципалітетів Котор, Тіват та Герцег-Нові — загалом понад 70 000 мешканців Которської затоки."
about.p2: "Лікарня має п'ять стаціонарних відділень та шість спеціалізованих амбулаторій. Окрім головного корпусу у Шкальярі, лікарня також керує філіальним об'єктом у Мелінах, що надає реабілітаційні послуги."
about.p3: "Триває проєкт розширення лікарні вартістю €9 мільйонів, що значно покращить потужності та якість послуг. Лікарня також є партнером проєкту ЄС TELE.DOC (€1,116M) з розвитку телемедицини в регіоні."
about.stat.employees: "працівників"
about.stat.doctors: "лікарів"
about.stat.municipalities: "муніципалітети"
about.stat.expansion: "розширення"
about.project.expansion.title: "Розширення лікарні — €9M"
about.project.expansion.desc: "Нові потужності, сучасне обладнання та оновлені приміщення для якісніших послуг."
about.project.teledoc.title: "TELE.DOC — проєкт ЄС, €1,116M"
about.project.teledoc.desc: "Розвиток телемедицини та цифрової охорони здоров'я у транскордонному регіоні."

