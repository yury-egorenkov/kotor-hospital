dept.surgery.name: "Загальна хірургія"
dept.surgery.desc: "Відділення загальної хірургії виконує планові та екстрені хірургічні втручання. Охоплює абдомінальну хірургію, травматологію та малі оперативні втручання."
dept.surgery.service1: "Абдомінальна хірургія"
