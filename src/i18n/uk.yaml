dept.gynecology.name: "Гінекологія та акушерство"
dept.gynecology.desc: "Повний гінекологічний та акушерський захист — від пренатального спостереження до пологів та гінекологічних операцій. Пологове відділення обладнане для природних та оперативних пологів."
