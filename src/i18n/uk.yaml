clinic.ophthalmology.detail: "Офтальмологічна амбулаторія проводить повні огляди зору — перевірка гостроти зору, вимірювання внутрішньоочного тиску, огляд очного дна та підбір корекції. Рання діагностика глаукоми та катаракти."
