patients.insurance.summary: "Лікарня приймає пацієнтів з обов'язковим, європейським та приватним страхуванням, а також на платній основі."
patients.insurance.more: "Детальніше про страхування"

insurance.page.description: "Медичне страхування в Загальній лікарні Котора — Фонд, ЄКМС, приватне страхування та самоплата."
insurance.badge: "Страхування"
insurance.title: "Медичне страхування"
insurance.subtitle: "Які види страхування ми приймаємо та що потрібно знати перед візитом."

insurance.fond.title: "Фонд медичного страхування"
insurance.fond.p1: "Загальна лікарня Котора має договір з Фондом медичного страхування Чорногорії. Покриваються: невідкладна допомога, стаціонарне та амбулаторне лікування, діагностика та реабілітація."
insurance.fond.p2: "Необхідно мати при собі медичну книжку (књижица) та направлення (упут) від лікаря. Для невідкладних випадків направлення не потрібне."
insurance.fond.p3: "Для застрахованих мешканців лікування безкоштовне в межах договірних послуг — додаткових витрат немає."

insurance.eu.title: "Європейська картка — ЄКМС / EHIC"
insurance.eu.p1: "Громадяни ЄС/ЄЕЗ можуть використовувати Європейську картку медичного страхування (ЄКМС/EHIC). Покривається невідкладна та медично необхідна допомога під час перебування."
insurance.eu.p2: "ЄКМС не покриває: планові процедури, репатріацію, елективну стоматологію. Пред'явіть картку на рецепції до початку лікування."
insurance.eu.p3: "Без картки — послуги оплачуються повністю, відшкодування запитується в країні проживання."

insurance.private.title: "Приватне страхування"
insurance.private.p1: "Лікарня приймає приватне медичне страхування. З окремими компаніями можливий прямий розрахунок; в інших випадках оплата здійснюється заздалегідь з подальшим відшкодуванням."
insurance.private.p2: "Візьміть із собою поліс страхування та посвідчення особи або паспорт. Для попереднього узгодження зверніться на рецепцію лікарні."

insurance.selfpay.title: "Без страхування — самоплата"
insurance.selfpay.p1: "Пацієнти без страхування можуть скористатися послугами лікарні з оплатою за прейскурантом. Прейскурант доступний на рецепції."
insurance.selfpay.p2: "Оплата здійснюється до або при виписці. Приймаємо готівку та банківські картки."
insurance.selfpay.p3: "Невідкладна медична допомога надається всім пацієнтам незалежно від наявності страхування."

laboratory.page.description: "Лабораторія Загальної лікарні Котора — види аналізів, підготовка, графік роботи, результати та портал eZdravlje."
laboratory.badge: "Лабораторія"
laboratory.title: "Лабораторія"
laboratory.subtitle: "Види аналізів, підготовка до здачі, графік роботи та отримання результатів."

laboratory.tests.title: "Види аналізів"
laboratory.tests.p1: "Гематологія (загальний аналіз крові, коагулограма, група крові), біохімія (глюкоза, ліпіди, функція печінки та нирок, електроліти) та аналіз сечі."
laboratory.tests.p2: "Додаткові аналізи доступні за направленням лікаря-спеціаліста."

laboratory.preparation.title: "Підготовка до аналізів"
laboratory.preparation.p1: "Кров здається натще (8–12 годин без їжі, вода дозволяється). Рекомендується ранковий забір (07:00–09:00)."
laboratory.preparation.p2: "Візьміть із собою направлення та картку медичного страхування. Повідомте персонал про ліки, які ви приймаєте."

laboratory.hours.title: "Графік роботи"
laboratory.hours.p1: "Пн–пт 07:00–15:00. Забір крові: 07:00–09:00. Екстрена лабораторія: цілодобово через приймальне відділення."
laboratory.hours.p2: "Для планових аналізів крові запис не потрібен."

laboratory.results.title: "Результати"
laboratory.results.p1: "Планові результати: того ж дня або наступного робочого дня. Спеціалізовані аналізи: 3–5 робочих днів."
laboratory.results.p2: "Результати доступні через портал eZdravlje або на рецепції. Термінові результати передаються безпосередньо лікарю, який направив пацієнта."

laboratory.ezdravlje.title: "Портал eZdravlje"
laboratory.ezdravlje.p1: "Національний медичний портал для доступу до результатів аналізів. Реєстрація за JMBG та номером картки медичного страхування."
laboratory.ezdravlje.p2: "Переглядайте результати аналізів, направлення та рецепти на ezdravlje.me."

meljine.page.description: "Філія Мелїне — реабілітаційні послуги, фізіотерапія, розташування, графік роботи та контакти."
meljine.badge: "Філія Мелїне"
meljine.title: "Філія Мелїне"
meljine.subtitle: "Реабілітаційний центр Загальної лікарні Котора в Герцег-Нові."

meljine.rehabilitation.title: "Реабілітаційні послуги"
meljine.rehabilitation.p1: "Філія надає стаціонарну та амбулаторну реабілітацію: фізіотерапія, кінезітерапія, електротерапія, гідротерапія та програми відновлення після операцій і травм."
meljine.rehabilitation.p2: "Прийом на реабілітацію здійснюється за направленням лікуючого лікаря або спеціаліста. Програма підбирається індивідуально для кожного пацієнта."

meljine.location.title: "Розташування"
meljine.location.p1: "Мелїне, Герцег-Нові. Заклад розташований на березі Бока-Которської затоки, у спокійній обстановці, ідеальній для відновлення."
meljine.location.p2: "Від основної лікарні в Шкалярах, Котор — 30 км головною дорогою через Рісан. З центру Герцег-Нові — 3 км."

meljine.hours.title: "Графік роботи"
meljine.hours.p1: "Стаціонар: цілодобово. Амбулаторна реабілітація: пн–пт 07:00–15:00."
meljine.hours.p2: "Амбулаторні послуги — за попереднім записом. Для стаціонарного прийому необхідне направлення."

meljine.contact.title: "Контакти"
meljine.contact.p1: "Телефон: +382 31 672 272. Адреса: Мелїне, Герцег-Нові, Чорногорія."
meljine.contact.p2: "З питань госпіталізації та запису на реабілітацію звертайтеся на рецепцію філії."

