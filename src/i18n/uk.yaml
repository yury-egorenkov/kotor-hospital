dept.internal.name: "Внутрішня медицина"
dept.internal.desc: "Відділення внутрішньої медицини займається діагностикою та лікуванням захворювань внутрішніх органів — серцево-судинна система, пульмонологія, гастроентерологія, ендокринологія."
