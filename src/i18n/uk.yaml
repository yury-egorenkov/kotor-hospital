dept.emergency.name: "Приймальне відділення"
dept.emergency.desc: "Відділення невідкладної допомоги надає екстрену медичну допомогу 24 години на добу, 7 днів на тиждень. Обладнане для лікування всіх невідкладних станів — від травм до гострих захворювань."
