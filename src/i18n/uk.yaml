clinic.endocrinology.service3: "УЗД щитоподібної залози та гормональні аналізи"
clinic.gastroenterology.detail: "Гастроентерологічна амбулаторія проводить діагностику та лікування захворювань травної системи — гастроскопія, колоноскопія, УЗД черевної порожнини. Скринінг колоректального раку."
