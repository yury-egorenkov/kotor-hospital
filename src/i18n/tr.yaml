dept.emergency.name: "Acil servis"
dept.emergency.desc: "Acil servis bölümü haftanın 7 günü, 24 saat kesintisiz acil tıbbi yardım sunmaktadır. Travmalardan akut hastalıklara kadar tüm acil durumların tedavisi için donatılmıştır."
