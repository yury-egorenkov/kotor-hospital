about.badge: "Hakkımızda"
about.title: "Hastane hakkında"
about.p1: "Kotor Devlet Hastanesi, Kotor, Tivat ve Herceg Novi belediyelerinin — toplamda Kotor Körfezi'ndeki 70.000'den fazla kişinin sağlık hizmetini sunmaktadır."
about.p2: "Hastane beş yataklı bölüm ve altı uzman polikliniğe sahiptir. Škaljari'deki ana binanın yanı sıra, rehabilitasyon hizmetleri sunan Meljine şube binasını da yönetmektedir."
about.p3: "Hastane kapasitesini ve hizmet kalitesini önemli ölçüde artıracak 9 milyon Euro değerinde genişleme projesi devam etmektedir. Hastane ayrıca bölgede teletıbbın geliştirilmesine yönelik AB projesi TELE.DOC'un (1.116.000 Euro) ortağıdır."
about.stat.employees: "çalışan"
about.stat.doctors: "doktor"
about.stat.municipalities: "belediye"
about.stat.expansion: "genişleme"
about.project.expansion.title: "Hastane genişlemesi — €9M"
about.project.expansion.desc: "Daha kaliteli hizmet için yeni kapasiteler, modern donanım ve yenilenmiş alanlar."
about.project.teledoc.title: "TELE.DOC — AB projesi, €1,116M"
about.project.teledoc.desc: "Sınır ötesi bölgede teletıp ve dijital sağlık hizmetlerinin geliştirilmesi."

