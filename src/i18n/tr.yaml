clinic.surgery.detail: "Cerrahi polikliniği uzman muayeneleri, ameliyat sonrası kontrolleri ve küçük cerrahi müdahaleleri ayakta tedavi koşullarında gerçekleştirir. Hastanenin cerrahi bölümü bünyesinde çalışır."
clinic.surgery.service1: "Ameliyat öncesi muayene ve hazırlık"
clinic.surgery.service2: "Ameliyat sonrası kontrol ve pansuman"
clinic.surgery.service3: "Küçük cerrahi müdahaleler (ayakta tedavi)"
clinic.internal.detail: "Dahiliye polikliniği kardiyoloji, göğüs hastalıkları ve genel dahiliye muayeneleri yapar. EKG tanısı, ultrason ve laboratuvar tetkikleri yerinde mevcuttur."
clinic.internal.service1: "EKG ve kardiyoloji muayeneleri"
clinic.internal.service2: "Göğüs hastalıkları muayeneleri ve spirometri"
clinic.internal.service3: "Genel dahiliye muayenesi ve laboratuvar"
clinic.dermatology.detail: "Dermatoloji polikliniği cilt muayeneleri, ben dermatoskopisi, cilt hastalıklarının tedavisi ve cilt bakımı danışmanlığı sunar. Kriyoterapi de mevcuttur."
clinic.dermatology.service1: "Ben ve pigmentli lezyonların dermatoskopisi"
clinic.dermatology.service2: "Egzama, sedef ve dermatit tedavisi"
clinic.dermatology.service3: "Kriyoterapi ve küçük dermatocerrahi işlemler"
clinic.ophthalmology.detail: "Göz polikliniği kapsamlı göz muayeneleri sunar — görme keskinliği testi, göz içi basınç ölçümü, göz dibi muayenesi ve düzeltici lens reçetesi. Glokom ve katarakt erken tanısı."
clinic.ophthalmology.service1: "Görme keskinliği ve kırma kusuru testi"
clinic.ophthalmology.service2: "Tonometre (göz içi basınç ölçümü)"
clinic.ophthalmology.service3: "Göz dibi muayenesi ve göz hastalıkları tanısı"
clinic.endocrinology.detail: "Endokrinoloji polikliniği hormonal bozuklukların tanı ve tedavisiyle ilgilenir — tiroid hastalıkları, diyabet, metabolik sendrom. Tiroid ultrasonu yerinde mevcuttur."
clinic.endocrinology.service1: "Tiroid hastalıklarının tanı ve tedavisi"
clinic.endocrinology.service2: "Diyabet ve metabolik sendrom yönetimi"
clinic.endocrinology.service3: "Tiroid ultrasonu ve hormonal analizler"
clinic.gastroenterology.detail: "Gastroenteroloji polikliniği sindirim sistemi hastalıklarının tanı ve tedavisini sağlar — gastroskopi, kolonoskopi, karın ultrasonu. Kolorektal kanser taraması."
clinic.gastroenterology.service1: "Gastroskopi (özofagogastroduodenoskopi)"
clinic.gastroenterology.service2: "Kolonoskopi ve kalın bağırsak taraması"
clinic.gastroenterology.service3: "Karın ultrasonu ve hepatobiliyer tanı"
