dept.emergency.service2: "Resüsitasyon ve yoğun bakım"
dept.emergency.service3: "Travma ve yaralanma tedavisi"
dept.emergency.hours: "Çalışma: 0–24, her gün"
dept.emergency.phone: "+382 32 325 602"

dept.surgery.name: "Genel cerrahi"
dept.surgery.desc: "Genel cerrahi bölümü elektif ve acil cerrahi müdahaleler gerçekleştirmektedir. Karın cerrahisi, travmatoloji ve küçük cerrahi işlemleri kapsamaktadır."
dept.surgery.service1: "Karın cerrahisi"
dept.surgery.service2: "Travmatoloji ve ortopedi"
dept.surgery.service3: "Günübirlik cerrahi"
dept.surgery.hours: "Elektif: Pzt–Cum, 07–15"

dept.gynecology.name: "Kadın Hastalıkları ve Doğum"
dept.gynecology.desc: "Doğum öncesi takipten doğuma ve jinekolojik operasyonlara kadar kapsamlı kadın hastalıkları ve doğum hizmeti. Doğumhane, normal ve sezaryen doğumlar için donatılmıştır."
dept.gynecology.service1: "Doğum öncesi tanı ve gebelik takibi"
dept.gynecology.service2: "Doğumhane (normal doğum ve sezaryen)"
dept.gynecology.service3: "Jinekolojik operasyonlar"
dept.gynecology.hours: "Acil: 0–24 / Poliklinik: Pzt–Cum, 07–15"

dept.internal.name: "Dahiliye"
dept.internal.desc: "Dahiliye bölümü iç organ hastalıklarının tanı ve tedavisiyle ilgilenmektedir — kardiyovasküler sistem, göğüs hastalıkları, gastroenteroloji, endokrinoloji."
dept.internal.service1: "Kardiyoloji ve EKG tanısı"
dept.internal.service2: "Gastroenteroloji ve endoskopi"
dept.internal.service3: "Endokrinoloji ve diyabetoloji"
dept.internal.hours: "Yataklı servis: 0–24 / Poliklinik: Pzt–Cum, 07–15"

dept.radiology.name: "Radyoloji"
dept.radiology.desc: "Radyoloji bölümü hastaneye kapsamlı tanısal destek sunmaktadır — röntgen, ultrason, BT tanısı."
dept.radiology.service1: "Dijital radyografi (röntgen)"
