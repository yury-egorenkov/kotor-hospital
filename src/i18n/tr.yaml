careers.about.p1: "Kotor Devlet Hastanesi, doktorlar, hemşireler, laborantlar ve idari personel dahil yaklaşık 250 çalışana sahiptir."
careers.about.p2: "Hastane, kamu sektöründe istikrarlı istihdam, mesleki gelişim fırsatları ve multidisipliner bir ekipte çalışma imkânı sunmaktadır."
careers.openings.title: "Güncel İlanlar"
careers.openings.p1: "Açık pozisyonlar Karadağ İş Kurumu web sitesinde ve hastane ilan panosunda yayınlanmaktadır."
careers.openings.p2: "Gerekli belgeler: özgeçmiş, diploma, çalışma lisansı (sağlık personeli için), adli sicil belgesi."
