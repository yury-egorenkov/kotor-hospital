insurance.page.description: "Kotor Devlet Hastanesi'nde sağlık sigortası — Kamu Fonu, EHIC, özel sigorta ve bireysel ödeme."
insurance.badge: "Sigorta"
insurance.title: "Sağlık Sigortası"
insurance.subtitle: "Hangi sigorta türlerini kabul ediyoruz ve ziyaretinizden önce bilmeniz gerekenler."

insurance.fond.title: "Sağlık Sigortası Fonu"
insurance.fond.p1: "Kotor Devlet Hastanesi, Karadağ Sağlık Sigortası Fonu ile sözleşmelidir. Kapsam: acil yardım, yatarak ve ayakta tedavi, teşhis ve rehabilitasyon."
insurance.fond.p2: "Sağlık sigortası kartınızı (knjižica) ve aile hekiminizden sevk (uput) getirmeniz gerekmektedir. Acil durumlar için sevk gerekmez."
insurance.fond.p3: "Sigortalı sakinler için ek maliyet yoktur — tedavi sözleşmeli hizmetler kapsamında ücretsizdir."

insurance.eu.title: "Avrupa Sağlık Sigortası Kartı — EHIC"
insurance.eu.p1: "AB/AEA vatandaşları Avrupa Sağlık Sigortası Kartı'nı (EHIC) kullanabilir. Konaklama süresince acil ve tıbbi olarak gerekli tedaviler kapsanır."
insurance.eu.p2: "EHIC kapsamında değildir: planlı işlemler, geri dönüş, isteğe bağlı diş tedavisi. Tedaviye başlamadan önce kartınızı resepsiyonda sunun."
insurance.eu.p3: "Kart olmadan — hizmetler peşin ödenir, geri ödeme kendi ülkenizde talep edilir."

insurance.private.title: "Özel Sigorta"
insurance.private.p1: "Hastane özel sağlık sigortasını kabul etmektedir. Bazı şirketlerle doğrudan faturalama mümkündür; diğerlerinde peşin ödeme yapılır ve geri ödeme talep edilir."
insurance.private.p2: "Sigorta poliçe belgelerinizi ve geçerli kimlik veya pasaportunuzu getirin. Ön onay için hastane resepsiyonuyla iletişime geçin."

insurance.selfpay.title: "Sigortasız — Bireysel Ödeme"
insurance.selfpay.p1: "Sigortasız hastalar fiyat listesine göre ödeme yaparak hastane hizmetlerinden yararlanabilir. Fiyat listesi resepsiyonda mevcuttur."
insurance.selfpay.p2: "Ödeme taburcu olmadan önce veya taburculukta yapılır. Nakit ve banka kartı kabul edilir."
insurance.selfpay.p3: "Acil tıbbi yardım, sigorta durumuna bakılmaksızın tüm hastalara sağlanır."

laboratory.page.description: "Kotor Devlet Hastanesi Laboratuvarı — test türleri, hazırlık, çalışma saatleri, sonuçlar ve eZdravlje portalı."
laboratory.badge: "Laboratuvar"
laboratory.title: "Laboratuvar"
laboratory.subtitle: "Test türleri, hazırlık talimatları, çalışma saatleri ve sonuçlarınızı nasıl alacağınız."

laboratory.tests.title: "Test Türleri"
laboratory.tests.p1: "Hematoloji (tam kan sayımı, pıhtılaşma, kan grubu), biyokimya (glukoz, lipitler, karaciğer ve böbrek fonksiyonu, elektrolitler) ve idrar analizi."
laboratory.tests.p2: "Ek testler uzman hekim sevki ile yapılabilir."

laboratory.preparation.title: "Test Hazırlığı"
laboratory.preparation.p1: "Kan testleri aç karnına yapılır (8–12 saat yemek yemeden, su içilebilir). Sabah numune alımı önerilir (07:00–09:00)."
laboratory.preparation.p2: "Sevk belgenizi ve sağlık sigortası kartınızı getirin. Kullandığınız ilaçlar hakkında personeli bilgilendirin."

laboratory.hours.title: "Çalışma Saatleri"
laboratory.hours.p1: "Pzt–Cum 07:00–15:00. Kan alma: 07:00–09:00. Acil laboratuvar: Acil servis üzerinden 7/24."
laboratory.hours.p2: "Rutin kan testleri için randevu gerekmez."

laboratory.results.title: "Sonuçlar"
laboratory.results.p1: "Rutin sonuçlar: aynı gün veya sonraki iş günü. Özel testler: 3–5 iş günü."
laboratory.results.p2: "Sonuçlar eZdravlje portalı veya resepsiyondan alınabilir. Acil sonuçlar doğrudan sevk eden hekime iletilir."

laboratory.ezdravlje.title: "eZdravlje Portalı"
laboratory.ezdravlje.p1: "Test sonuçlarına erişim için ulusal sağlık portalı. JMBG ve sağlık kartı numaranız ile kaydolun."
laboratory.ezdravlje.p2: "Laboratuvar sonuçlarınızı, sevklerinizi ve reçetelerinizi ezdravlje.me adresinden görüntüleyin."

meljine.page.description: "Meljine Şubesi — rehabilitasyon hizmetleri, fizik tedavi, konum, çalışma saatleri ve iletişim."
meljine.badge: "Meljine Şubesi"
meljine.title: "Meljine Şubesi"
meljine.subtitle: "Kotor Devlet Hastanesi'nin Herceg Novi'deki rehabilitasyon merkezi."

meljine.rehabilitation.title: "Rehabilitasyon Hizmetleri"
meljine.rehabilitation.p1: "Şube yatılı ve ayakta rehabilitasyon hizmeti sunmaktadır: fizik tedavi, kinezitoterapi, elektroterapi, hidroterapi ve ameliyat/yaralanma sonrası iyileşme programları."
meljine.rehabilitation.p2: "Rehabilitasyona kabul, aile hekimi veya uzman hekim sevki ile yapılır. Programlar her hastanın bireysel ihtiyaçlarına göre düzenlenir."

meljine.location.title: "Konum"
meljine.location.p1: "Meljine, Herceg Novi. Tesis, Kotor Körfezi kıyısında, iyileşme için ideal sakin bir ortamda yer almaktadır."
meljine.location.p2: "Škaljari, Kotor'daki ana hastaneden — Risan üzerinden ana yoldan 30 km. Herceg Novi merkezinden — 3 km."

meljine.hours.title: "Çalışma Saatleri"
meljine.hours.p1: "Yatılı servis: 7/24. Ayakta rehabilitasyon: Pzt–Cum 07:00–15:00."
meljine.hours.p2: "Ayakta tedavi hizmetleri randevu ile verilir. Yatılı kabul için sevk gereklidir."

meljine.contact.title: "İletişim"
meljine.contact.p1: "Telefon: +382 31 672 272. Adres: Meljine, Herceg Novi, Karadağ."
meljine.contact.p2: "Kabul bilgileri ve rehabilitasyon randevusu için şube resepsiyonu ile iletişime geçin."

faq.page.description: "Kotor Devlet Hastanesi hakkında sık sorulan sorular — sevk, randevu, sigorta, yabancı hastalar, otopark."
faq.badge: "SSS"
faq.title: "Sık Sorulan Sorular"
faq.subtitle: "Hastaların en sık sorduğu soruların yanıtları."
faq.q1: "Sevk gerekli mi?"
faq.a1: "Uzman konsültasyonu ve hastane tedavisi için aile hekiminden sevk gereklidir. Acil bakım için sevk gerekmez."
faq.q2: "Nasıl randevu alabilirim?"
faq.a2: "Hastane resepsiyonunu +382 32 325 602 numarasından arayın veya bizzat başvurun. Laboratuvar testleri için randevu gerekmez."
faq.q3: "Sağlık sigortası olmadan tedavi olabilir miyim?"
faq.a3: "Evet. Sigortasız hastalar fiyat listesine göre ödeme yapar. Acil bakım, sigorta durumuna bakılmaksızın herkese sağlanır."
faq.q4: "Uluslararası hastalar hangi belgelere ihtiyaç duyar?"
faq.a4: "Pasaport ve sağlık sigortası (AB vatandaşları için EHIC kartı veya özel sigorta poliçesi). Sigortasız — fiyat listesine göre ödeme."
faq.q5: "Otopark var mı?"
faq.a5: "Evet, hastanenin önünde ücretsiz otopark mevcuttur. Yer sayısı sınırlıdır."
faq.q6: "Hastanenin çalışma saatleri nedir?"
faq.a6: "Acil servis 7/24 açıktır. Poliklinikler ve laboratuvar: Pzt–Cum 07:00–15:00. Hasta ziyaretleri: her gün 14:00–16:00."
faq.q7: "Hastanede Wi-Fi var mı?"
faq.a7: "Evet, bekleme alanlarında ve servislerde ücretsiz Wi-Fi mevcuttur."

news.page.description: "Kotor Devlet Hastanesi haberleri — projeler, ekipman, duyurular."
news.badge: "Haberler"
news.title: "Haberler"
news.subtitle: "Hastane faaliyetleri ve gelişimi hakkında güncel bilgiler."
news.expansion.title: "Genişleme Projesi — €9M"
news.expansion.p1: "Hastane tarihindeki en büyük altyapı projesi devam etmektedir. Modern ameliyathaneler, yoğun bakım ve tanı merkezi ile yeni bir bina inşa edilmektedir."
news.expansion.p2: "Beklenen tamamlanma: 2026. €9 milyon yatırım Karadağ devlet bütçesinden finanse edilmektedir."
news.teledoc.title: "TELE.DOC — AB Projesi"
news.teledoc.p1: "Teletıp hizmetlerinin geliştirilmesi için Karadağ–Hırvatistan sınır ötesi projesi. Bütçe: €1,116M, AB IPA fonlarından finanse edilmektedir."
news.teledoc.p2: "Proje, uzak bölgelerdeki hastalar için uzaktan konsültasyon ve tanı imkânı sağlamaktadır."
news.equipment.title: "Yeni Ekipman"
news.equipment.p1: "Hastane sürekli olarak modern tıbbi ekipmana yatırım yapmaktadır. Son dönemde yeni ultrason cihazları ve laboratuvar ekipmanı temin edilmiştir."

prices.page.description: "Kotor Devlet Hastanesi fiyat listesi — hizmet fiyatları, sigorta ve ödeme bilgileri."
prices.badge: "Fiyatlar"
prices.title: "Hizmet Fiyatları"
prices.subtitle: "Tıbbi hizmet fiyatlandırması hakkında bilgiler."
prices.fund.title: "Kamu Sigortalı Hastalar"
prices.fund.p1: "Karadağ Sağlık Sigortası Fonu kapsamındaki hastalar için tedavi, sözleşmeli hizmetler dahilinde ücretsizdir. Aile hekiminden sevk gereklidir."
prices.selfpay.title: "Bireysel Ödeme"
prices.selfpay.p1: "Sigortasız hastalar hastane fiyat listesine göre ödeme yapar. Fiyat listesi resepsiyonda mevcuttur."
prices.selfpay.p2: "Ödeme taburcu olmadan önce veya taburculukta yapılır. Nakit ve banka kartı kabul edilir."
prices.info.title: "Hizmet Fiyatlarını Öğrenme"
prices.info.p1: "Belirli hizmetlerin fiyatları hakkında bilgi için hastane resepsiyonunu arayın: +382 32 325 602 veya bizzat başvurun."
prices.info.p2: "Fiyatlar hizmet türüne, tanı yöntemlerine ve tedavi süresine bağlıdır. Kesin tutar muayene sonrası belirlenir."

careers.page.description: "Kotor Devlet Hastanesi'nde kariyer — açık pozisyonlar, çalışma koşulları, İK iletişimi."
