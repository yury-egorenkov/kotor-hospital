insurance.page.description: "Health insurance at Kotor General Hospital — Public Fund, EHIC, private insurance and self-pay."
insurance.badge: "Insurance"
insurance.title: "Health Insurance"
insurance.subtitle: "What types of insurance we accept and what you need to know before your visit."

insurance.fond.title: "Health Insurance Fund"
insurance.fond.p1: "Kotor General Hospital has a contract with the Health Insurance Fund of Montenegro. Covered services include: emergency care, inpatient and outpatient treatment, diagnostics and rehabilitation."
insurance.fond.p2: "You will need your health insurance card (knjižica) and a referral (uput) from your GP. Referrals are not required for emergencies."
insurance.fond.p3: "There are no out-of-pocket costs for insured residents — treatment is free within contracted services."

insurance.eu.title: "European Health Insurance Card — EHIC"
insurance.eu.p1: "EU/EEA citizens can use the European Health Insurance Card (EHIC). It covers emergency medical care and medically necessary treatment during your stay."
insurance.eu.p2: "EHIC does not cover: planned procedures, repatriation, or elective dental care. Present your card at reception before treatment begins."
insurance.eu.p3: "Without a card — services must be paid in full upfront, and reimbursement can be claimed in your home country."

insurance.private.title: "Private Insurance"
insurance.private.p1: "The hospital accepts private health insurance. Direct billing is available with select companies; otherwise, pay upfront and claim reimbursement from your insurer."
insurance.private.p2: "Bring your insurance policy documents and a valid ID or passport. Contact the hospital reception for pre-authorization."

insurance.selfpay.title: "No Insurance — Self-Pay"
insurance.selfpay.p1: "Uninsured patients can access hospital services by paying according to the price list. The price list is available at reception."
insurance.selfpay.p2: "Payment is due before or at discharge. We accept cash and bank cards."
insurance.selfpay.p3: "Emergency medical care is provided to all patients regardless of insurance status."

laboratory.page.description: "Laboratory at Kotor General Hospital — test types, preparation, working hours, results and eZdravlje portal."
laboratory.badge: "Laboratory"
laboratory.title: "Laboratory"
laboratory.subtitle: "Test types, preparation instructions, working hours and how to get your results."

laboratory.tests.title: "Test Types"
laboratory.tests.p1: "Haematology (complete blood count, coagulation, blood typing), biochemistry (glucose, lipids, liver and kidney function, electrolytes) and urine analysis."
laboratory.tests.p2: "Additional tests available upon specialist referral."

laboratory.preparation.title: "Preparation for Testing"
laboratory.preparation.p1: "Blood tests require fasting (8–12 hours without food, water is permitted). Morning sample collection is recommended (07:00–09:00)."
laboratory.preparation.p2: "Bring your referral and health insurance card. Inform staff about any medications you are taking."

laboratory.hours.title: "Working Hours"
laboratory.hours.p1: "Mon–Fri 07:00–15:00. Blood collection: 07:00–09:00. Emergency lab: 24/7 through the Emergency department."
laboratory.hours.p2: "No appointment needed for routine bloodwork."

laboratory.results.title: "Results"
laboratory.results.p1: "Routine results: same day or next business day. Specialized tests: 3–5 business days."
laboratory.results.p2: "Results available via the eZdravlje portal or at reception. Urgent results are communicated directly to the referring physician."

laboratory.ezdravlje.title: "eZdravlje Portal"
laboratory.ezdravlje.p1: "National health portal for accessing test results. Register with your JMBG and health card number."
laboratory.ezdravlje.p2: "View lab results, referrals and prescriptions at ezdravlje.me."

meljine.page.description: "Meljine Branch — rehabilitation services, physical therapy, location, working hours and contact."
meljine.badge: "Meljine Branch"
meljine.title: "Meljine Branch"
meljine.subtitle: "Rehabilitation centre of Kotor General Hospital in Herceg Novi."

meljine.rehabilitation.title: "Rehabilitation Services"
meljine.rehabilitation.p1: "The branch provides inpatient and outpatient rehabilitation: physical therapy, kinesitherapy, electrotherapy, hydrotherapy and post-operative and post-injury recovery programmes."
meljine.rehabilitation.p2: "Admission for rehabilitation requires a referral from your GP or specialist. Programmes are tailored to each patient's individual needs."

meljine.location.title: "Location"
meljine.location.p1: "Meljine, Herceg Novi. The facility is located on the shore of the Bay of Kotor, in a peaceful environment ideal for recovery."
meljine.location.p2: "From the main hospital in Škaljari, Kotor — 30 km via the main road through Risan. From Herceg Novi centre — 3 km."

meljine.hours.title: "Working Hours"
meljine.hours.p1: "Inpatient ward: 24/7. Outpatient rehabilitation: Mon–Fri 07:00–15:00."
meljine.hours.p2: "Outpatient services require an appointment. Inpatient admission requires a referral."

meljine.contact.title: "Contact"
meljine.contact.p1: "Phone: +382 31 672 272. Address: Meljine, Herceg Novi, Montenegro."
meljine.contact.p2: "For admission information and rehabilitation scheduling, contact the branch reception."

faq.page.description: "Frequently asked questions about Kotor General Hospital — referrals, appointments, insurance, international patients, parking."
faq.badge: "FAQ"
faq.title: "Frequently Asked Questions"
faq.subtitle: "Answers to the most common patient questions."
faq.q1: "Do I need a referral?"
faq.a1: "A referral from your GP is required for specialist consultations and hospital treatment. No referral is needed for emergency care."
faq.q2: "How can I book an appointment?"
faq.a2: "Call the hospital reception at +382 32 325 602 or visit in person. No appointment is needed for laboratory tests."
faq.q3: "Can I receive treatment without health insurance?"
faq.a3: "Yes. Uninsured patients pay according to the hospital price list. Emergency care is provided to everyone regardless of insurance status."
faq.q4: "What documents do international patients need?"
faq.a4: "Passport and health insurance (EHIC card for EU citizens or private insurance policy). Without insurance — payment according to price list."
faq.q5: "Is there parking available?"
faq.a5: "Yes, free parking is available in front of the hospital. The number of spaces is limited."
faq.q6: "What are the hospital's working hours?"
faq.a6: "Emergency department operates 24/7. Outpatient clinics and laboratory: Mon–Fri 07:00–15:00. Patient visits: daily 14:00–16:00."
faq.q7: "Does the hospital have Wi-Fi?"
faq.a7: "Yes, free Wi-Fi is available in waiting areas and on the wards."

news.page.description: "Kotor General Hospital news — projects, equipment, announcements."
news.badge: "News"
news.title: "News"
news.subtitle: "Latest updates on hospital operations and development."
news.expansion.title: "Expansion Project — €9M"
news.expansion.p1: "The largest infrastructure project in the hospital's history is underway. A new building is being constructed with modern operating theatres, intensive care and a diagnostic centre."
news.expansion.p2: "Expected completion: 2026. The €9 million investment is funded from the Montenegrin state budget."
news.teledoc.title: "TELE.DOC — EU Project"
news.teledoc.p1: "A cross-border Montenegro–Croatia project for the development of telemedicine services. Budget: €1.116M, funded by EU IPA funds."
news.teledoc.p2: "The project enables remote consultations and diagnostics for patients in remote areas."
news.equipment.title: "New Equipment"
news.equipment.p1: "The hospital continuously invests in modern medical equipment. Recently acquired: new ultrasound machines and laboratory equipment."

prices.page.description: "Kotor General Hospital price list — information on service prices, insurance and payment."
prices.badge: "Prices"
prices.title: "Service Prices"
prices.subtitle: "Information about medical service pricing."
prices.fund.title: "Public Insurance Patients"
prices.fund.p1: "Treatment is free of charge for patients insured through the Montenegrin Health Insurance Fund, within the scope of contracted services. A GP referral is required."
prices.selfpay.title: "Self-Pay"
prices.selfpay.p1: "Uninsured patients pay according to the hospital price list. The price list is available at reception."
prices.selfpay.p2: "Payment is due before or at discharge. We accept cash and bank cards."
prices.info.title: "How to Find Out Service Prices"
prices.info.p1: "For pricing information on specific services, contact the hospital reception at +382 32 325 602 or visit in person."
prices.info.p2: "Prices depend on the type of service, diagnostics and duration of treatment. The final amount is determined after examination."

careers.page.description: "Careers at Kotor General Hospital — open positions, working conditions, HR contact."
careers.badge: "Careers"
careers.title: "Careers"
careers.subtitle: "Information about working at the hospital and current vacancies."
careers.about.title: "Working at the Hospital"
careers.about.p1: "Kotor General Hospital employs approximately 250 staff, including physicians, nurses, lab technicians and administrative personnel."
careers.about.p2: "The hospital offers stable public sector employment, opportunities for professional development and work within a multidisciplinary team."
careers.openings.title: "Current Vacancies"
careers.openings.p1: "Open positions are published on the Employment Bureau of Montenegro website and on the hospital notice board."
careers.openings.p2: "Required documents: CV, diploma, professional licence (for medical staff), criminal record certificate."
careers.contact.title: "HR Contact"
careers.contact.p1: "Phone: +382 32 325 602. Email: obk@t-com.me. Address: Škaljari bb, 85331 Kotor."
careers.contact.p2: "For additional information about vacancies and employment conditions, contact the hospital HR department."

