clinic.dermatology.desc: "Skin examinations, dermatoscopy, treatment of skin conditions."
clinic.ophthalmology.name: "Ophthalmology"
clinic.ophthalmology.desc: "Vision tests, intraocular pressure measurement, fundoscopy."
clinic.endocrinology.name: "Endocrinology"
