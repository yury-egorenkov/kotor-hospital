dept.surgery.bring.item3: "List of current medications and known allergies"
dept.surgery.bring.item4: "Previous medical records and test results"
dept.surgery.bring.item5: "Personal hygiene items, pyjamas and slippers"

dept.surgery.equip.item1: "Modern operating rooms with electrosurgical and laparoscopic equipment"
dept.surgery.equip.item2: "Continuous patient monitoring — ECG, pulse oximetry, capnography"
dept.surgery.equip.item3: "Anaesthesia stations with automated ventilation systems"
dept.surgery.equip.item4: "Sterilisation unit meeting European hospital hygiene standards"

