dept.emergency.name: "Emergency Department"
dept.emergency.desc: "The Emergency Department provides urgent medical care 24 hours a day, 7 days a week. Equipped to handle all emergency conditions — from trauma to acute illnesses."
dept.emergency.service1: "Triage and emergency diagnostics"
dept.emergency.service2: "Resuscitation and intensive care"
dept.emergency.service3: "Trauma and injury management"
dept.emergency.hours: "Open: 24/7, every day"
dept.emergency.phone: "+382 32 325 602"

dept.surgery.name: "General Surgery"
dept.surgery.desc: "The General Surgery Department performs elective and emergency surgical procedures. Covers abdominal surgery, traumatology and minor surgical interventions."
dept.surgery.service1: "Abdominal surgery"
dept.surgery.service2: "Traumatology and orthopedics"
dept.surgery.service3: "Day surgery"
dept.surgery.hours: "Elective: Mon–Fri, 07:00–15:00"

dept.gynecology.name: "Gynecology and Obstetrics"
dept.gynecology.desc: "Comprehensive gynecological and obstetric care — from prenatal monitoring to delivery and gynecological surgeries. The maternity ward is equipped for natural and operative deliveries."
dept.gynecology.service1: "Prenatal diagnostics and pregnancy monitoring"
dept.gynecology.service2: "Maternity ward (natural and cesarean delivery)"
dept.gynecology.service3: "Gynecological surgeries"
dept.gynecology.hours: "Emergency: 24/7 / Clinic: Mon–Fri, 07:00–15:00"

dept.internal.name: "Internal Medicine"
dept.internal.desc: "The Internal Medicine Department handles diagnostics and treatment of internal organ diseases — cardiovascular system, pulmonology, gastroenterology, endocrinology."
dept.internal.service1: "Cardiology and ECG diagnostics"
dept.internal.service2: "Gastroenterology and endoscopy"
dept.internal.service3: "Endocrinology and diabetology"
dept.internal.hours: "Inpatient: 24/7 / Clinic: Mon–Fri, 07:00–15:00"

dept.radiology.name: "Radiology"
dept.radiology.desc: "The Radiology Department provides comprehensive diagnostic support to the hospital — X-rays, ultrasound, CT diagnostics."
dept.radiology.service1: "Digital radiography (X-ray)"
dept.radiology.service2: "Ultrasound diagnostics"
dept.radiology.service3: "Computed tomography (CT)"
dept.radiology.hours: "Mon–Fri, 07:00–20:00 / Sat, 08:00–14:00"

