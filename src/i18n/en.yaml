dept.surgery.about.p1: "The General Surgery Department is one of the largest departments at Kotor General Hospital, with 16 inpatient beds and two fully equipped operating rooms. The department performs both elective and emergency surgical procedures, covering the full range of general surgery for the Bay of Kotor population."
dept.surgery.about.p2: "The surgical wards are equipped for pre-operative preparation, post-operative recovery and short-term intensive monitoring. The operating rooms feature modern anaesthesia equipment, electrosurgical units and patient monitoring systems."
dept.surgery.about.p3: "Emergency surgery is available 24/7 — a surgical team is always on call for acute conditions including appendicitis, bowel obstruction, trauma and internal bleeding. Elective procedures are scheduled Monday through Friday."

dept.surgery.prep.title: "Before Your Surgery"
dept.surgery.prep.item1: "Do not eat or drink for 8 hours before your scheduled procedure"
dept.surgery.prep.item2: "Inform the surgeon about all medications you are currently taking"
dept.surgery.prep.item3: "Bring your referral, insurance card and any previous test results"
dept.surgery.prep.item4: "Arrive at least 1 hour before the scheduled time for admission paperwork"
dept.surgery.prep.item5: "Wear comfortable, loose-fitting clothing; remove jewellery and nail polish"

