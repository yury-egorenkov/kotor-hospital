about.badge: "About Us"
about.title: "About the Hospital"
about.p1: "The Public Health Institution General Hospital Kotor provides healthcare to the residents of the municipalities of Kotor, Tivat and Herceg Novi — a total of over 70,000 residents of the Bay of Kotor."
about.p2: "The hospital has five inpatient departments and six specialist outpatient clinics. In addition to the main facility in Škaljari, the hospital also operates a branch facility in Meljine providing rehabilitation services."
about.p3: "A €9 million hospital expansion project is underway, which will significantly improve capacity and quality of services. The hospital is also a partner in the EU project TELE.DOC (€1.116M) for the development of telemedicine in the region."
