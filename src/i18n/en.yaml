clinic.surgery.detail: "The Surgical Clinic provides specialist consultations, post-operative follow-ups and minor surgical procedures on an outpatient basis. Operates as part of the hospital's surgical department."
clinic.surgery.service1: "Pre-operative consultations and preparation"
clinic.surgery.service2: "Post-operative follow-ups and wound care"
clinic.surgery.service3: "Minor surgical procedures (outpatient)"
clinic.internal.detail: "The Internal Medicine Clinic performs cardiology, pulmonology and general internal medicine examinations. ECG diagnostics, ultrasound and laboratory work available on-site."
clinic.internal.service1: "ECG and cardiology examinations"
clinic.internal.service2: "Pulmonology examinations and spirometry"
clinic.internal.service3: "General internal medicine examination with laboratory"
clinic.dermatology.detail: "The Dermatology Clinic provides skin examinations, dermatoscopy of moles, treatment of skin conditions and skin care counseling. Cryotherapy also available."
clinic.dermatology.service1: "Dermatoscopy of moles and pigmented lesions"
clinic.dermatology.service2: "Treatment of eczema, psoriasis and dermatitis"
clinic.dermatology.service3: "Cryotherapy and minor dermatosurgical procedures"
clinic.ophthalmology.detail: "The Ophthalmology Clinic provides comprehensive eye examinations — visual acuity testing, intraocular pressure measurement, fundoscopy and prescription of corrective lenses. Early diagnosis of glaucoma and cataracts."
clinic.ophthalmology.service1: "Visual acuity and refraction testing"
clinic.ophthalmology.service2: "Tonometry (intraocular pressure measurement)"
clinic.ophthalmology.service3: "Fundoscopy and diagnosis of eye diseases"
clinic.endocrinology.detail: "The Endocrinology Clinic handles diagnosis and treatment of hormonal disorders — thyroid diseases, diabetes, metabolic syndrome. Thyroid ultrasound available on-site."
clinic.endocrinology.service1: "Diagnosis and treatment of thyroid diseases"
clinic.endocrinology.service2: "Diabetes and metabolic syndrome management"
clinic.endocrinology.service3: "Thyroid ultrasound and hormonal analysis"
clinic.gastroenterology.detail: "The Gastroenterology Clinic provides diagnosis and treatment of digestive system diseases — gastroscopy, colonoscopy, abdominal ultrasound. Colorectal cancer screening."
clinic.gastroenterology.service1: "Gastroscopy (esophagogastroduodenoscopy)"
clinic.gastroenterology.service2: "Colonoscopy and colon screening"
clinic.gastroenterology.service3: "Abdominal ultrasound and hepatobiliary diagnostics"
