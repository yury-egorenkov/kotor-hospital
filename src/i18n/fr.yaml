about.badge: "À propos"
about.title: "À propos de l'hôpital"
about.p1: "L'établissement public de santé Hôpital général de Kotor assure les soins de santé pour la population des municipalités de Kotor, Tivat et Herceg Novi — plus de 70 000 habitants de la baie de Kotor."
about.p2: "L'hôpital dispose de cinq services d'hospitalisation et six consultations spécialisées. En plus du bâtiment principal à Škaljari, l'hôpital gère une filiale à Meljine qui propose des services de rééducation."
about.p3: "Un projet d'agrandissement d'une valeur de 9 millions d'euros est en cours, qui améliorera considérablement les capacités et la qualité des services. L'hôpital est également partenaire du projet européen TELE.DOC (1,116 M€) pour le développement de la télémédecine dans la région."
about.stat.employees: "employés"
about.stat.doctors: "médecins"
about.stat.municipalities: "municipalités"
about.stat.expansion: "agrandissement"
about.project.expansion.title: "Agrandissement de l'hôpital — 9 M€"
about.project.expansion.desc: "Nouvelles capacités, équipements modernes et locaux rénovés pour des services de meilleure qualité."
about.project.teledoc.title: "TELE.DOC — projet UE, 1,116 M€"
about.project.teledoc.desc: "Développement de la télémédecine et des soins de santé numériques dans la région transfrontalière."

