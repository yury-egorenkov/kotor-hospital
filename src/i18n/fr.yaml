clinic.ophthalmology.detail: "La clinique d'ophtalmologie propose des examens oculaires complets — test d'acuité visuelle, mesure de la pression intraoculaire, fond d'œil et prescription de verres correcteurs. Dépistage précoce du glaucome et de la cataracte."
