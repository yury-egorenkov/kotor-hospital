about.project.expansion.desc: "Nouvelles capacités, équipements modernes et locaux rénovés pour des services de meilleure qualité."
about.project.teledoc.title: "TELE.DOC — projet UE, 1,116 M€"
about.project.teledoc.desc: "Développement de la télémédecine et des soins de santé numériques dans la région transfrontalière."

about.page.description: "À propos de l'Hôpital général de Kotor — histoire, mission, projets, direction et filiale Meljine."
about.subtitle: "Établissement public de santé assurant les soins médicaux aux municipalités de Kotor, Tivat et Herceg Novi."
about.mission.title: "Mission"
about.mission.desc: "L'Hôpital général de Kotor est l'établissement hospitalier central de la région de la baie de Kotor. Notre mission est de fournir des soins de santé de qualité, accessibles et modernes à plus de 70 000 habitants de trois municipalités côtières."
about.projects.title: "Projets"
about.meljine.title: "Filiale Meljine"
about.meljine.desc: "La filiale à Meljine, Herceg Novi, propose des services de rééducation et de physiothérapie. Elle complète les capacités de l'hôpital principal à Škaljari."
