# Block known bots/scrapers by User-Agent
map $http_user_agent $is_bot {
    default 0;
    # AI crawlers
    ~*GPTBot 1;
    ~*ChatGPT 1;
    ~*CCBot 1;
    ~*Bytespider 1;
    ~*anthropic-ai 1;
    ~*Claude-Web 1;
    ~*cohere-ai 1;
    ~*Diffbot 1;
    ~*PerplexityBot 1;
    # SEO scrapers
    ~*AhrefsBot 1;
    ~*SemrushBot 1;
    ~*MJ12bot 1;
    ~*DotBot 1;
    ~*PetalBot 1;
    # Scraping libraries
    ~*Scrapy 1;
    ~*python-requests 1;
    ~*Go-http-client 1;
    ~*Java/ 1;
    ~*Apache-HttpClient 1;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=html:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Block bots
    if ($is_bot) {
        return 403;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Robots noindex (controlled via ROBOTS_NOINDEX env variable)
    set $robots_tag "";
    if (-f /etc/nginx/noindex.flag) {
        set $robots_tag "noindex, nofollow";
    }
    add_header X-Robots-Tag $robots_tag always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Boat photos: long cache, no rate limit (imaginary fetches originals here)
    location /img/boats/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Clean URLs: try exact file, then .html, then directory, then SPA fallback
    location / {
        limit_req zone=html burst=20 nodelay;
        try_files $uri $uri.html $uri/ /index.html;
    }

    # API proxy to backend (temporarily disabled — uncomment when tlc-api is deployed)
    # location /api/ {
    #     proxy_pass http://tlc-api:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Cache static assets (no rate limit — imaginary generates many image requests)
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache HTML pages
    location ~* \.html$ {
        limit_req zone=html burst=20 nodelay;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
